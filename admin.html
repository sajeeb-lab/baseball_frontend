<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ambassadors Baseball — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:   #0d1f38;
  --navy2:  #162845;
  --red:    #c8102e;
  --red2:   #a50d25;
  --white:  #ffffff;
  --light:  #f4f6f9;
  --mid:    #dde2ea;
  --muted:  #7a8499;
  --green:  #16a34a;
  --amber:  #b45309;
  --text:   #1a2235;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Source Sans 3', sans-serif; background: var(--light); color: var(--text); min-height: 100vh; }

/* ── LOGIN ── */
#login-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--navy);
  background-image: repeating-linear-gradient(45deg, rgba(255,255,255,.015) 0, rgba(255,255,255,.015) 1px, transparent 0, transparent 50%);
  background-size: 20px 20px;
}
.login-box {
  background: var(--white); border-radius: 16px; padding: 48px 44px;
  width: 100%; max-width: 420px; box-shadow: 0 24px 60px rgba(0,0,0,.35);
}
.login-logo { font-family: 'Oswald', sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--navy); letter-spacing: .08em; text-align: center; margin-bottom: 6px; }
.login-logo span { color: var(--red); }
.login-sub { text-align: center; color: var(--muted); font-size: .85rem; margin-bottom: 32px; }
.login-label { display: block; font-size: .78rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.login-input {
  width: 100%; padding: 11px 14px; border: 1.5px solid var(--mid); border-radius: 8px;
  font-family: 'Source Sans 3', sans-serif; font-size: .95rem; margin-bottom: 16px;
  transition: border-color .2s; outline: none;
}
.login-input:focus { border-color: var(--navy); }
.login-btn {
  width: 100%; padding: 13px; background: var(--navy); color: var(--white);
  border: none; border-radius: 8px; font-family: 'Oswald', sans-serif;
  font-size: 1rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
  cursor: pointer; transition: background .15s; margin-top: 4px;
}
.login-btn:hover { background: var(--navy2); }
.login-err { color: var(--red); font-size: .85rem; font-weight: 600; margin-top: 10px; text-align: center; }

/* ── SHELL ── */
#app { display: none; min-height: 100vh; }
.topbar {
  background: var(--navy); padding: 0 28px; height: 58px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,.25);
}
.topbar-brand { font-family: 'Oswald', sans-serif; font-size: 1.15rem; font-weight: 700; color: var(--white); letter-spacing: .1em; }
.topbar-brand span { color: var(--red); }
.topbar-right { display: flex; align-items: center; gap: 14px; }
.admin-badge { background: var(--red); color: var(--white); font-size: .7rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; }
.logout-btn {
  background: rgba(255,255,255,.1); color: rgba(255,255,255,.8); border: 1px solid rgba(255,255,255,.15);
  border-radius: 6px; padding: 6px 14px; font-size: .82rem; font-weight: 600; cursor: pointer;
  font-family: 'Source Sans 3', sans-serif; transition: background .15s;
}
.logout-btn:hover { background: rgba(255,255,255,.18); color: var(--white); }

.content { padding: 28px; max-width: 1400px; margin: 0 auto; }

/* ── STATS ROW ── */
.stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 28px; }
.stat-card {
  background: var(--white); border: 1px solid var(--mid); border-radius: 12px;
  padding: 18px 20px; display: flex; align-items: center; gap: 14px;
}
.stat-icon { width: 46px; height: 46px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
.stat-num { font-family: 'Oswald', sans-serif; font-size: 1.8rem; font-weight: 700; line-height: 1; }
.stat-lbl { font-size: .78rem; color: var(--muted); margin-top: 3px; font-weight: 500; }

/* ── SECTION ── */
.section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 12px; }
.section-title { font-family: 'Oswald', sans-serif; font-size: 1.2rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; }
.search-wrap { display: flex; align-items: center; gap: 8px; background: var(--white); border: 1.5px solid var(--mid); border-radius: 8px; padding: 8px 14px; min-width: 260px; }
.search-wrap svg { flex-shrink: 0; color: var(--muted); }
.search-wrap input { border: none; outline: none; font-family: 'Source Sans 3', sans-serif; font-size: .9rem; width: 100%; background: transparent; }

/* ── COACHES TABLE ── */
.coaches-table { background: var(--white); border: 1px solid var(--mid); border-radius: 12px; overflow: hidden; }
.coaches-table table { width: 100%; border-collapse: collapse; }
.coaches-table th {
  background: var(--light); padding: 11px 16px; font-size: .72rem; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase; color: var(--muted);
  border-bottom: 2px solid var(--mid); text-align: left;
}
.coaches-table td { padding: 13px 16px; border-bottom: 1px solid var(--mid); font-size: .9rem; vertical-align: middle; }
.coaches-table tr:last-child td { border-bottom: none; }
.coaches-table tr:hover td { background: #f8f9fc; }

.coach-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
.coach-avatar-placeholder { width: 40px; height: 40px; border-radius: 50%; background: var(--navy); display: flex; align-items: center; justify-content: center; color: var(--white); font-family: 'Oswald', sans-serif; font-size: .9rem; font-weight: 700; flex-shrink: 0; }
.coach-name { font-weight: 700; font-size: .92rem; }
.coach-email { font-size: .8rem; color: var(--muted); }

.status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: .75rem; font-weight: 700; }
.status-active   { background: #dcfce7; color: #15803d; }
.status-inactive { background: #fee2e2; color: #dc2626; }

.tbl-btn {
  display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px;
  border-radius: 6px; font-size: .78rem; font-weight: 700; cursor: pointer;
  font-family: 'Source Sans 3', sans-serif; border: 1.5px solid; transition: all .15s; text-decoration: none;
}
.tbl-btn-view   { color: var(--navy); border-color: var(--navy); background: transparent; }
.tbl-btn-view:hover { background: var(--navy); color: var(--white); }
.tbl-btn-dashboard { color: #7c3aed; border-color: #7c3aed; background: transparent; }
.tbl-btn-dashboard:hover { background: #7c3aed; color: var(--white); }

.tbl-btn-activate:hover { background: var(--green); color: var(--white); }
.tbl-btn-deactivate { color: var(--red); border-color: var(--red); background: transparent; }
.tbl-btn-deactivate:hover { background: var(--red); color: var(--white); }
.tbl-btn-delete { color: #7f1d1d; border-color: #7f1d1d; background: transparent; }
.tbl-btn-delete:hover { background: #7f1d1d; color: var(--white); }

/* ── MODAL OVERLAY ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(10,22,40,.6); backdrop-filter: blur(4px);
  z-index: 500; display: flex; align-items: flex-start; justify-content: center;
  padding: 40px 16px; opacity: 0; pointer-events: none; transition: opacity .25s; overflow-y: auto;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--white); border-radius: 14px; width: 100%; max-width: 860px;
  transform: translateY(20px); transition: transform .25s; box-shadow: 0 24px 60px rgba(0,0,0,.3);
  overflow: hidden;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-header {
  background: var(--navy); padding: 20px 24px; display: flex; align-items: flex-start; justify-content: space-between;
}
.modal-header-left h2 { font-family: 'Oswald', sans-serif; color: var(--white); font-size: 1.25rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; }
.modal-header-left p { color: rgba(255,255,255,.55); font-size: .82rem; margin-top: 3px; }
.modal-close { background: rgba(255,255,255,.12); border: none; color: var(--white); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: background .15s; flex-shrink: 0; }
.modal-close:hover { background: rgba(255,255,255,.22); }
.modal-body { padding: 24px; }

/* Modal tabs */
.modal-tabs { display: flex; gap: 4px; background: var(--light); border-radius: 8px; padding: 4px; margin-bottom: 22px; }
.modal-tab { flex: 1; padding: 9px; border-radius: 6px; border: none; background: transparent; font-family: 'Oswald', sans-serif; font-size: .82rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; cursor: pointer; color: var(--muted); transition: all .15s; }
.modal-tab.active { background: var(--navy); color: var(--white); }
.modal-tab-panel { display: none; }
.modal-tab-panel.active { display: block; }

/* Profile card in modal */
.profile-card { display: flex; gap: 18px; align-items: flex-start; background: var(--light); border-radius: 10px; padding: 16px; margin-bottom: 20px; }
.profile-photo { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 3px solid var(--white); }
.profile-photo-placeholder { width: 72px; height: 72px; border-radius: 50%; background: var(--navy); display: flex; align-items: center; justify-content: center; color: var(--white); font-family: 'Oswald', sans-serif; font-size: 1.4rem; font-weight: 700; flex-shrink: 0; border: 3px solid var(--white); }
.profile-info h3 { font-family: 'Oswald', sans-serif; font-size: 1.1rem; font-weight: 700; letter-spacing: .04em; }
.profile-info p { font-size: .84rem; color: var(--muted); margin-top: 2px; }
.profile-meta { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
.profile-meta-item { display: flex; align-items: center; gap: 5px; font-size: .8rem; color: var(--muted); }

/* Edit form */
.edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.field-group { display: flex; flex-direction: column; gap: 5px; }
.field-group.span2 { grid-column: 1/-1; }
.field-label { font-size: .75rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); }
.field-input, .field-select {
  padding: 9px 12px; border: 1.5px solid var(--mid); border-radius: 7px;
  font-family: 'Source Sans 3', sans-serif; font-size: .9rem; outline: none;
  transition: border-color .2s;
}
.field-input:focus, .field-select:focus { border-color: var(--navy); }
.save-btn {
  margin-top: 16px; padding: 11px 28px; background: var(--navy); color: var(--white);
  border: none; border-radius: 7px; font-family: 'Oswald', sans-serif; font-size: .9rem;
  font-weight: 600; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; transition: background .15s;
}
.save-btn:hover { background: var(--navy2); }
.save-msg { font-size: .84rem; font-weight: 600; margin-top: 10px; }
.save-msg.ok  { color: var(--green); }
.save-msg.err { color: var(--red); }

/* Info table inside modal */
.info-table { width: 100%; border-collapse: collapse; font-size: .88rem; }
.info-table th { background: var(--light); padding: 9px 12px; font-size: .7rem; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; color: var(--muted); border-bottom: 2px solid var(--mid); text-align: left; }
.info-table td { padding: 10px 12px; border-bottom: 1px solid var(--mid); vertical-align: middle; }
.info-table tr:last-child td { border-bottom: none; }
.info-table tr:hover td { background: #f8f9fc; }

/* Empty */
.empty-state { text-align: center; padding: 36px; color: var(--muted); font-size: .9rem; }
.empty-state svg { display: block; margin: 0 auto 10px; opacity: .3; }

/* Toggle switch */
.toggle-wrap { display: flex; align-items: center; gap: 14px; padding: 16px; background: var(--light); border-radius: 10px; margin-bottom: 20px; }
.toggle { position: relative; width: 48px; height: 26px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: #ccc; border-radius: 26px; cursor: pointer; transition: background .2s; }
.toggle-slider::before { content: ''; position: absolute; width: 20px; height: 20px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: transform .2s; }
.toggle input:checked + .toggle-slider { background: var(--green); }
.toggle input:checked + .toggle-slider::before { transform: translateX(22px); }
.toggle-text strong { display: block; font-size: .9rem; font-weight: 700; }
.toggle-text span { font-size: .8rem; color: var(--muted); }

/* Reg count badge */
.reg-badge { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; background: var(--red); color: var(--white); font-size: .7rem; font-weight: 800; }

/* Loading */
.loading { display: flex; align-items: center; justify-content: center; padding: 60px; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--mid); border-top-color: var(--navy); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* toast */
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  background: var(--navy); color: var(--white); padding: 12px 20px;
  border-radius: 8px; font-size: .88rem; font-weight: 600;
  box-shadow: 0 8px 24px rgba(0,0,0,.25); transform: translateY(80px); opacity: 0;
  transition: all .3s; pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.red { background: var(--red); }
.toast.green { background: var(--green); }

@media(max-width:700px) {
  .stats-row { grid-template-columns: repeat(2,1fr); }
  .edit-grid { grid-template-columns: 1fr; }
  .content { padding: 16px; }
}


/* ── VIEW TOGGLE ── */
.view-toggle-bar { display:flex; align-items:center; border-bottom:2px solid var(--mid); margin:-28px -28px 24px -28px; padding:0 28px; background:var(--white); }
.view-toggle-btn { display:inline-flex; align-items:center; gap:6px; padding:15px 20px; border:none; border-bottom:3px solid transparent; background:transparent; font-family:'Oswald',sans-serif; font-size:.8rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); cursor:pointer; transition:all .18s; white-space:nowrap; margin-bottom:-2px; }
.view-toggle-btn svg { transition:opacity .18s; opacity:.55; }
.view-toggle-btn:hover { color:var(--navy); }
.view-toggle-btn:hover svg { opacity:1; }
.view-toggle-btn.active { color:var(--navy); border-bottom-color:var(--red); }
.view-toggle-btn.active svg { opacity:1; }

/* ── FINANCIAL SUB-HEADER ── */
.fin-subheader { background:linear-gradient(135deg,#1a3fc4 0%,#1535a8 100%); position:relative; overflow:hidden; border-radius:12px; margin-bottom:1.4rem; }
.fin-subheader::before { content:''; position:absolute; inset:0; background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E"); }
.fin-subheader-inner { display:flex; align-items:center; gap:.75rem; position:relative; flex-wrap:wrap; padding:1.2rem 28px; }
.fin-nav-btn { background:rgba(255,255,255,.08); border:1.5px solid rgba(255,255,255,.15); color:rgba(255,255,255,.85); padding:10px 20px; border-radius:8px; cursor:pointer; font-family:'Oswald',sans-serif; font-size:.82rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase; transition:all .2s ease; white-space:nowrap; }
.fin-nav-btn:hover { background:rgba(255,255,255,.15); color:var(--white); border-color:rgba(255,255,255,.25); transform:translateY(-1px); }
.fin-nav-btn.active { background:var(--red); border-color:var(--red); color:var(--white); box-shadow:0 4px 12px rgba(200,16,46,.35); }
.fin-team-wrap { position:relative; display:inline-flex; align-items:center; }
.fin-team-select { appearance:none; -webkit-appearance:none; background:rgba(255,255,255,.08); border:1.5px solid rgba(255,255,255,.15); color:rgba(255,255,255,.85); padding:10px 40px 10px 18px; border-radius:8px; cursor:pointer; font-family:'Oswald',sans-serif; font-size:.82rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase; outline:none; min-width:220px; transition:all .2s ease; }
.fin-team-select:hover { background:rgba(255,255,255,.15); border-color:rgba(255,255,255,.25); transform:translateY(-1px); }
.fin-team-select.active { background:var(--red); border-color:var(--red); color:var(--white); box-shadow:0 4px 12px rgba(200,16,46,.35); }
.fin-team-select option { background:#0d1f38; color:var(--white); font-family:'Source Sans 3',sans-serif; text-transform:none; letter-spacing:0; }
.fin-team-wrap::after { content:'▼'; position:absolute; right:14px; top:50%; transform:translateY(-50%); font-size:.65rem; color:rgba(255,255,255,.6); pointer-events:none; }

/* ── FINANCIAL CONTENT ── */
.fin-metrics-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:1rem; margin-bottom:1.8rem; }
.fin-metric-card { background:var(--white); border-radius:8px; padding:1.2rem 1.3rem; box-shadow:0 2px 12px rgba(0,0,0,.07); border:1px solid var(--mid); display:flex; gap:.9rem; align-items:flex-start; transition:all .2s; }
.fin-metric-card:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.1); }
.fin-metric-card.budget-card { background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%); color:var(--white); border-color:var(--navy); position:relative; overflow:hidden; }
.fin-metric-card.budget-card::after { content:''; position:absolute; right:-40px; bottom:-40px; width:130px; height:130px; border-radius:50%; background:rgba(200,16,46,.15); pointer-events:none; }
.fin-metric-card.alert-card { background:linear-gradient(135deg,#fef3f5 0%,#fde8ec 100%); border-color:#f5c6cb; }
.fin-metric-card.chart-card { grid-column:span 2; }
.fin-metric-icon { width:44px; height:44px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:1.2rem; position:relative; z-index:1; background:rgba(10,22,40,.07); }
.budget-card .fin-metric-icon { background:rgba(255,255,255,.15); }
.fin-metric-icon.c-players  { background:rgba(59,130,246,.12); }
.fin-metric-icon.c-collected{ background:rgba(22,163,74,.12); }
.fin-metric-icon.c-balance  { background:rgba(200,16,46,.12); }
.fin-metric-icon.c-good     { background:rgba(22,163,74,.12); }
.fin-metric-icon.c-alert    { background:rgba(200,16,46,.12); }
.fin-metric-icon.c-deadline { background:rgba(180,83,9,.12); }
.fin-metric-icon.c-teams    { background:rgba(124,58,237,.12); }
.fin-metric-icon.c-profit   { background:rgba(245,197,24,.18); }
.fin-metric-body { display:flex; flex-direction:column; gap:.25rem; flex:1; position:relative; z-index:1; min-width:0; }
.fin-metric-label { font-size:.68rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
.budget-card .fin-metric-label { color:rgba(255,255,255,.7); }
.fin-metric-value { font-family:'Oswald',sans-serif; font-size:1.65rem; font-weight:700; color:var(--navy); line-height:1.1; }
.budget-card .fin-metric-value { color:var(--white); }
.fin-metric-sub { font-size:.76rem; color:var(--muted); }
.budget-card .fin-metric-sub { color:rgba(255,255,255,.65); }
.fin-section-card { background:var(--white); border-radius:10px; border:1px solid var(--mid); margin-bottom:1.4rem; overflow:hidden; box-shadow:0 2px 10px rgba(0,0,0,.06); }
.fin-section-head { background:var(--red); padding:11px 20px; display:flex; justify-content:space-between; align-items:center; gap:.75rem; flex-wrap:wrap; }
.fin-section-head h2 { font-family:'Oswald',sans-serif; font-size:.9rem; font-weight:700; color:var(--white); letter-spacing:.12em; text-transform:uppercase; }
.fin-section-body { padding:1.3rem 1.4rem; }
.fin-controls { display:flex; gap:.6rem; align-items:center; flex-wrap:wrap; }
.fin-controls .fin-search { display:flex; align-items:center; gap:.5rem; background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.25); border-radius:6px; padding:5px 12px; }
.fin-controls .fin-search input { border:none; background:none; outline:none; color:var(--white); font-family:'Source Sans 3',sans-serif; font-size:.84rem; width:180px; }
.fin-controls .fin-search input::placeholder { color:rgba(255,255,255,.6); }
.fin-filter { padding:6px 12px; border:1px solid rgba(255,255,255,.25); border-radius:6px; background:rgba(255,255,255,.15); font-family:'Source Sans 3',sans-serif; font-size:.82rem; color:var(--white); cursor:pointer; outline:none; }
.fin-tbl { width:100%; border-collapse:collapse; font-size:.85rem; }
.fin-tbl thead tr { background:var(--navy); }
.fin-tbl th { padding:10px 14px; text-align:left; font-family:'Oswald',sans-serif; font-size:.7rem; font-weight:700; color:var(--white); letter-spacing:.1em; text-transform:uppercase; white-space:nowrap; }
.fin-tbl td { padding:11px 14px; border-bottom:1px solid var(--mid); vertical-align:middle; font-size:.85rem; }
.fin-tbl tbody tr:last-child td { border-bottom:none; }
.fin-tbl tbody tr:hover { background:var(--light); }
.fin-tbl .f-paid    { color:#16a34a; font-weight:700; font-family:'Oswald',sans-serif; }
.fin-tbl .f-balance { color:var(--red); font-weight:700; font-family:'Oswald',sans-serif; }
.fin-tbl .f-name    { font-weight:700; color:var(--navy); }
.fin-status { display:inline-flex; align-items:center; padding:3px 9px; border-radius:20px; font-family:'Oswald',sans-serif; font-size:.66rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase; border:1px solid transparent; }
.fin-status.paid    { background:#f0fdf4; color:#15803d; border-color:#bbf7d0; }
.fin-status.partial { background:#fffbea; color:#92400e; border-color:#fde68a; }
.fin-status.unpaid  { background:#fef3f5; color:var(--red); border-color:#f5c6cb; }
.fin-ranking-list { display:flex; flex-direction:column; gap:.75rem; }
.fin-ranking-card { display:flex; align-items:center; gap:1.2rem; padding:1rem 1.2rem; background:var(--light); border-radius:8px; border:1.5px solid var(--mid); transition:all .2s; position:relative; flex-wrap:wrap; }
.fin-ranking-card:hover { transform:translateX(4px); box-shadow:0 2px 12px rgba(0,0,0,.08); border-color:var(--navy); }
.fin-rank-num { width:44px; height:44px; background:var(--navy); color:var(--white); border-radius:8px; display:flex; align-items:center; justify-content:center; font-family:'Oswald',sans-serif; font-size:1.3rem; font-weight:700; flex-shrink:0; }
.fin-ranking-card:first-child .fin-rank-num { background:var(--red); }
.fin-team-info { flex:1; min-width:160px; }
.fin-team-info h3 { font-family:'Oswald',sans-serif; font-size:1rem; font-weight:700; color:var(--navy); letter-spacing:.03em; text-transform:uppercase; }
.fin-team-info p { font-size:.78rem; color:var(--muted); margin-top:2px; }
.fin-team-stats { display:flex; gap:1.5rem; flex-wrap:wrap; }
.fin-stat { display:flex; flex-direction:column; gap:.15rem; }
.fin-stat-lbl { font-size:.62rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
.fin-stat-val { font-family:'Oswald',sans-serif; font-size:.95rem; font-weight:700; color:var(--navy); }
.fin-completed-badge { position:absolute; top:10px; right:10px; background:#16a34a; color:var(--white); padding:3px 9px; border-radius:4px; font-family:'Oswald',sans-serif; font-size:.62rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase; }
.fin-pagination { display:flex; align-items:center; justify-content:space-between; gap:.75rem; padding:.75rem 1rem; border-top:1px solid var(--mid); flex-wrap:wrap; }
.fin-pagination-info { font-size:.8rem; color:var(--muted); }
.fin-pagination-controls { display:flex; align-items:center; gap:.6rem; }
.fin-page-btn { display:inline-flex; align-items:center; justify-content:center; min-width:32px; height:30px; padding:0 8px; border:1.5px solid var(--mid); border-radius:6px; background:var(--white); font-family:'Source Sans 3',sans-serif; font-size:.8rem; font-weight:600; color:var(--text); cursor:pointer; transition:all .15s; }
.fin-page-btn:hover:not(:disabled) { border-color:var(--navy); color:var(--navy); }
.fin-page-btn.current { border-color:var(--red); color:var(--red); cursor:default; }
.fin-page-btn:disabled { color:var(--mid); cursor:not-allowed; background:var(--light); }
.fin-per-page { appearance:none; -webkit-appearance:none; padding:4px 22px 4px 10px; border:1.5px solid var(--mid); border-radius:6px; background:var(--white); font-size:.8rem; font-family:'Source Sans 3',sans-serif; cursor:pointer; outline:none; }
.fin-error { background:#fef3f5; border:1.5px solid #f5c6cb; border-radius:8px; padding:.8rem 1rem; margin-bottom:1.2rem; display:flex; align-items:center; justify-content:space-between; gap:.75rem; color:var(--red); font-size:.84rem; flex-wrap:wrap; }
.fin-retry { background:var(--red); color:var(--white); border:none; padding:5px 12px; border-radius:5px; font-family:'Oswald',sans-serif; font-size:.7rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase; cursor:pointer; }
/* Pie chart */
.fin-pie-wrap { width:190px; height:190px; margin:.5rem auto; position:relative; }
.fin-seg { cursor:pointer; pointer-events:stroke; transition:filter .15s; }
.fin-seg:hover { filter:brightness(1.15); }
.fin-chart-tt { position:absolute; background:var(--navy); color:var(--white); padding:7px 11px; border-radius:6px; box-shadow:0 4px 14px rgba(0,0,0,.25); pointer-events:none; opacity:0; transition:opacity .12s; z-index:10; white-space:nowrap; min-width:130px; }
.fin-chart-tt.show { opacity:1; }
.fin-chart-tt .ftt-lbl    { display:block; font-family:'Oswald',sans-serif; font-size:.62rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:rgba(255,255,255,.6); margin-bottom:2px; }
.fin-chart-tt .ftt-amt    { font-family:'Oswald',sans-serif; font-size:1rem; font-weight:700; }
.fin-chart-tt .ftt-pct    { color:rgba(255,255,255,.65); font-size:.76rem; margin-left:.3rem; }
.fin-legend { display:flex; justify-content:center; gap:1.2rem; margin-top:.5rem; flex-wrap:wrap; }
.fin-legend-item { display:flex; align-items:center; gap:.4rem; font-size:.8rem; color:var(--text); }
.fin-legend-dot { width:11px; height:11px; border-radius:50%; }
.fin-legend-dot.lc { background:#16a34a; } .fin-legend-dot.lb { background:#c8102e; } .fin-legend-dot.lp { background:#b45309; }
@media(max-width:900px) { .fin-metric-card.chart-card { grid-column:span 1; } }
@media(max-width:600px) { .fin-metrics-grid { grid-template-columns:1fr; } .fin-team-stats { gap:.8rem; } }

</style>
</head>
<body>
<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">AMBASSADORS <span>BASEBALL</span></div>
    <div class="login-sub">Admin Portal — Authorized Access Only</div>
    <label class="login-label">Username</label>
    <input class="login-input" type="text" id="login-user" placeholder="admin" autocomplete="username">
    <label class="login-label">Password</label>
    <input class="login-input" type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">AMBASSADORS <span>BASEBALL</span></div>
    <div class="topbar-right">
      <span class="admin-badge">Admin</span>
<button class="logout-btn" onclick="doLogout()">Sign Out</button>
    </div>
  </div>

  <div class="content">
    <!-- ── VIEW TOGGLE BAR ── -->
    <div class="view-toggle-bar">
      <button class="view-toggle-btn active" id="vt-coaches" onclick="switchAdminView('coaches')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        All Coaches
      </button>
      <button class="view-toggle-btn" id="vt-financial" onclick="switchAdminView('financial')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Financial Dashboard
      </button>
    </div>

    <!-- ── COACHES SECTION (default) ── -->
    <div id="coaches-section">

    <!-- Stats -->
    <div class="stats-row" id="stats-row">
      <div class="stat-card">
        <div class="stat-icon" style="background:#e8edf5;color:var(--navy);">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        </div>
        <div><div class="stat-num" id="stat-total">—</div><div class="stat-lbl">Total Coaches</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#dcfce7;color:#15803d;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <div><div class="stat-num" id="stat-active">—</div><div class="stat-lbl">Active Teams</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#fee2e2;color:#dc2626;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
        </div>
        <div><div class="stat-num" id="stat-inactive">—</div><div class="stat-lbl">Deactivated</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#fef9c3;color:#b45309;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        </div>
        <div><div class="stat-num" id="stat-regs">—</div><div class="stat-lbl">Total Registrations</div></div>
      </div>
    </div>

    <!-- Coaches table -->
    <div class="section-head">
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Search by name, team, state…" oninput="filterCoaches(this.value)">
      </div>
    </div>

    <div class="coaches-table" id="coaches-wrap">
      <div class="loading"><div class="spinner"></div></div>
    </div>
    </div><!-- /#coaches-section -->

    <!-- ── FINANCIAL SECTION ── -->
    <div id="fin-section" style="display:none;">
      <div class="fin-subheader">
        <div class="fin-subheader-inner">
          <button class="fin-nav-btn active" id="fin-org-btn" onclick="finSwitchView('org')">Organization Overview</button>
          <div class="fin-team-wrap">
            <select class="fin-team-select" id="fin-team-select" onchange="finOnTeamChange(this.value)">
              <option value="">Select Team…</option>
            </select>
          </div>
        </div>
      </div>
      <div id="fin-content-wrapper">
        <div style="text-align:center;padding:3rem;color:var(--muted);">Loading financial data…</div>
      </div>
    </div><!-- /#fin-section -->

  </div><!-- /.content -->

</div><!-- /#app -->

<!-- COACH DETAIL MODAL -->
<div class="modal-overlay" id="coach-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-header-left">
        <h2 id="modal-coach-name">Coach Details</h2>
        <p id="modal-coach-team"></p>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';
const API_BASE = 'https://backend-baseball-inky.vercel.app';
let adminToken = localStorage.getItem('admin_token') || '';
let allCoaches = [];
let currentCoachId = null;

// ── AUTH ──
async function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  document.getElementById('login-err').textContent = '';
  try {
    const res  = await fetch(`${API_BASE}/api/admin/login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || 'Login failed');
    adminToken = data.token;
    localStorage.setItem('admin_token', adminToken);
    showApp();
  } catch(err) {
    document.getElementById('login-err').textContent = err.message;
  }
}

function doLogout() {
  localStorage.removeItem('admin_token');
  adminToken = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function adminH() { return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` }; }

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadCoaches();
}

// ── LOAD COACHES ──
async function loadCoaches() {
  try {
    const res  = await fetch(`${API_BASE}/api/admin/coaches`, { headers: adminH() });
    if (res.status === 401) { doLogout(); return; }
    const data = await res.json();
    allCoaches = data.coaches || [];
    renderStats();
    renderCoaches(allCoaches);
  } catch(err) {
    document.getElementById('coaches-wrap').innerHTML = `<div class="empty-state">Failed to load coaches.</div>`;
  }
}

function renderStats() {
  const total    = allCoaches.length;
  const active   = allCoaches.filter(c => c.active).length;
  const inactive = total - active;
  const regs     = allCoaches.reduce((s, c) => s + c.registrationCount, 0);
  document.getElementById('stat-total').textContent   = total;
  document.getElementById('stat-active').textContent  = active;
  document.getElementById('stat-inactive').textContent = inactive;
  document.getElementById('stat-regs').textContent    = regs;
}

function renderCoaches(coaches) {
  if (!coaches.length) {
    document.getElementById('coaches-wrap').innerHTML = `<div class="empty-state"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>No coaches found.</div>`;
    return;
  }
  const rows = coaches.map(c => {
    const initials = ((c.firstName||'')[0]||'') + ((c.lastName||'')[0]||'');
    const avatar   = c.image
      ? `<img src="${esc(c.image)}" class="coach-avatar">`
      : `<div class="coach-avatar-placeholder">${esc(initials.toUpperCase())}</div>`;
    const statusBadge = c.active
      ? `<span class="status-badge status-active">● Active</span>`
      : `<span class="status-badge status-inactive">● Inactive</span>`;
    const toggleBtn = c.active
      ? `<button class="tbl-btn tbl-btn-deactivate" onclick="toggleActive('${c.id}', false)">Deactivate</button>`
      : `<button class="tbl-btn tbl-btn-activate"   onclick="toggleActive('${c.id}', true)">Activate</button>`;

    return `<tr>
      <td><div style="display:flex;align-items:center;gap:10px;">${avatar}<div><div class="coach-name">${esc(c.firstName)} ${esc(c.lastName)}</div><div class="coach-email">${esc(c.email)}</div></div></div></td>
      <td><strong>${esc(c.teamName||'—')}</strong></td>
      <td>${esc(c.state||'—')}</td>
      <td>${esc(c.ageGroup||'—')}</td>
      <td>${statusBadge}</td>
      <td><span style="display:inline-flex;align-items:center;gap:4px;">${c.registrationCount > 0 ? `<span class="reg-badge">${c.registrationCount}</span>` : '—'}</span></td>
      <td><div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button class="tbl-btn tbl-btn-view" onclick="openCoach('${c.id}')">View</button>
        <button class="tbl-btn tbl-btn-dashboard" onclick="accessDashboard('${c.id}')">Access Dashboard</button>
        ${toggleBtn}
        <button class="tbl-btn tbl-btn-delete" onclick="deleteCoach('${c.id}')">Delete</button>
      </div></td>
    </tr>`;
  }).join('');

  document.getElementById('coaches-wrap').innerHTML = `
    <table>
      <thead><tr>
        <th>Coach</th><th>Team</th><th>State</th><th>Age Group</th>
        <th>Status</th><th>Registrations</th><th>Actions</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function filterCoaches(q) {
  const lq = q.toLowerCase().trim();
  if (!lq) { renderCoaches(allCoaches); return; }
  renderCoaches(allCoaches.filter(c =>
    `${c.firstName} ${c.lastName} ${c.teamName} ${c.state} ${c.email} ${c.ageGroup}`.toLowerCase().includes(lq)
  ));
}

// ── TOGGLE ACTIVE ──
async function toggleActive(id, active) {
  try {
    const res  = await fetch(`${API_BASE}/api/admin/coaches/${id}/toggle-active`, {
      method: 'PUT', headers: adminH(), body: JSON.stringify({ active })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message);
    // Update local data
    const c = allCoaches.find(x => x.id === id);
    if (c) c.active = active;
    renderStats();
    renderCoaches(allCoaches);
    // Update modal toggle if open
    if (currentCoachId === id) {
      const tog = document.getElementById('modal-active-toggle');
      if (tog) tog.checked = active;
      updateToggleText(active);
    }
    showToast(active ? 'Coach activated — team now visible' : 'Coach deactivated — team hidden from list', active ? 'green' : 'red');
  } catch(err) {
    showToast(err.message, 'red');
  }
}

// ── OPEN COACH MODAL ──
async function openCoach(id) {
  currentCoachId = id;
  document.getElementById('modal-coach-name').textContent = 'Loading…';
  document.getElementById('modal-coach-team').textContent = '';
  document.getElementById('modal-body').innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
  document.getElementById('coach-modal').classList.add('open');
  document.body.style.overflow = 'hidden';

  try {
    const res  = await fetch(`${API_BASE}/api/admin/coaches/${id}`, { headers: adminH() });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message);
    renderModal(data);
  } catch(err) {
    document.getElementById('modal-body').innerHTML = `<div class="empty-state">Failed to load coach: ${esc(err.message)}</div>`;
  }
}

function renderModal({ coach, tryouts, registrations, roster, schedule }) {
  document.getElementById('modal-coach-name').textContent = `${coach.firstName} ${coach.lastName}`;
  document.getElementById('modal-coach-team').textContent = coach.teamName || 'No team name set';

  const initials = ((coach.firstName||'')[0]||'') + ((coach.lastName||'')[0]||'');
  const avatarHtml = coach.image
    ? `<img src="${esc(coach.image)}" class="profile-photo">`
    : `<div class="profile-photo-placeholder">${esc(initials.toUpperCase())}</div>`;

  // Registrations grouped by tryout
  const regsByTryout = {};
  registrations.forEach(r => {
    const key = r.tryout_date || 'Unknown';
    if (!regsByTryout[key]) regsByTryout[key] = [];
    regsByTryout[key].push(r);
  });

  const regsHtml = registrations.length === 0
    ? `<div class="empty-state"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/></svg>No registrations yet.</div>`
    : `<table class="info-table">
        <thead><tr><th>Player</th><th>Contact</th><th>Email</th><th>Cell</th><th>Tryout Date</th><th>Age</th><th>Position</th></tr></thead>
        <tbody>${registrations.map(r => `
          <tr>
            <td><strong>${esc(r.player_name||'—')}</strong></td>
            <td>${esc(r.name||'—')}</td>
            <td style="color:var(--muted)">${esc(r.email||'—')}</td>
            <td>${esc(r.cell||'—')}</td>
            <td>${esc(r.tryout_date||'—')}</td>
            <td>${esc(r.age||'—')}</td>
            <td>${esc([r.pos1,r.pos2].filter(Boolean).join(', ')||'—')}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;

  const rosterHtml = roster.length === 0
    ? `<div class="empty-state"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>No roster yet.</div>`
    : `<table class="info-table">
        <thead><tr><th>Name</th><th>Jersey</th><th>Grad Year</th><th>Position</th><th>HT/WT</th><th>City</th></tr></thead>
        <tbody>${roster.map(p => `
          <tr>
            <td><strong>${esc(p.name||'—')}</strong></td>
            <td>${esc(p.jersey||'—')}</td>
            <td>${esc(p.grad_year||'—')}</td>
            <td>${esc(p.position||'—')}</td>
            <td>${esc(p.hw||'—')}</td>
            <td>${esc(p.city||'—')}${p.state?', '+esc(p.state):''}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;

  const scheduleHtml = schedule.length === 0
    ? `<div class="empty-state"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>No schedule yet.</div>`
    : `<table class="info-table">
        <thead><tr><th>Date</th><th>Event</th><th>City</th><th>State</th></tr></thead>
        <tbody>${schedule.map(g => `
          <tr>
            <td>${esc(g.date||'—')}</td>
            <td><strong>${esc(g.event||'—')}</strong></td>
            <td>${esc(g.city||'—')}</td>
            <td>${esc(g.state||'—')}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;

  document.getElementById('modal-body').innerHTML = `
    <div class="profile-card">

function updateToggleText(active) {
  const lbl = document.getElementById('toggle-label');
  const sub = document.getElementById('toggle-sub');
  if (lbl) lbl.textContent = active ? 'Team is Visible' : 'Team is Hidden';
  if (sub) sub.textContent = active ? 'This team appears in the public directory and map.' : 'This team is hidden from the public directory and map.';
}

function switchModalTab(btn, panelId) {
  document.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.modal-tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(panelId).classList.add('active');
}

async function saveCoachEdit(id) {
  const msg = document.getElementById('edit-msg');
  msg.textContent = '';
  try {
    const payload = {
      firstName: document.getElementById('edit-fn').value.trim(),
      lastName:  document.getElementById('edit-ln').value.trim(),
      email:     document.getElementById('edit-email').value.trim(),
      phone:     document.getElementById('edit-phone').value.trim(),
      teamName:  document.getElementById('edit-team').value.trim(),
      ageGroup:  document.getElementById('edit-age').value,
      location:  document.getElementById('edit-loc').value.trim(),
      state:     document.getElementById('edit-state').value.trim(),
    };
    const res  = await fetch(`${API_BASE}/api/admin/coaches/${id}/edit`, {
      method: 'PUT', headers: adminH(), body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message);
    // Update local
    const c = allCoaches.find(x => x.id === id);
    if (c) Object.assign(c, { firstName: payload.firstName, lastName: payload.lastName, teamName: payload.teamName, state: payload.state, ageGroup: payload.ageGroup });
    renderCoaches(allCoaches);
    document.getElementById('modal-coach-name').textContent = `${payload.firstName} ${payload.lastName}`;
    document.getElementById('modal-coach-team').textContent = payload.teamName;
    msg.textContent = 'Changes saved!';
    msg.className = 'save-msg ok';
    showToast('Coach profile updated', 'green');
  } catch(err) {
    msg.textContent = err.message;
    msg.className = 'save-msg err';
  }
}

// ── ACCESS DASHBOARD (admin impersonate coach) ──
async function accessDashboard(id) {
  try {
    const res  = await fetch(`${API_BASE}/api/admin/coaches/${id}/token`, { headers: adminH() });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || 'Failed to get coach token');
    const url = `coach-dashboard.html?adminToken=${encodeURIComponent(data.token)}&adminCoachId=${encodeURIComponent(data.coachId)}`;
    window.open(url, '_blank');
  } catch(err) {
    showToast(err.message, 'red');
  }
}

// ── DELETE COACH ──
async function deleteCoach(id) {
  const coach = allCoaches.find(c => c.id === id);
  if (!coach) return;
  const fullName = `${coach.firstName} ${coach.lastName}`;
  const input = prompt(`This will permanently delete the coach account.\n\nType the coach's full name to confirm:\n"${fullName}"`);
  if (input === null) return; // cancelled
  if (input.trim() !== fullName.trim()) {
    showToast('Name did not match — coach not deleted', 'red');
    return;
  }
  try {
    const res  = await fetch(`${API_BASE}/api/admin/coaches/${id}`, {
      method: 'DELETE', headers: adminH()
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message);
    allCoaches = allCoaches.filter(c => c.id !== id);
    renderStats();
    renderCoaches(allCoaches);
    showToast('Coach deleted', 'red');
  } catch(err) {
    showToast(err.message, 'red');
  }
}

function closeModal() {
  document.getElementById('coach-modal').classList.remove('open');
  document.body.style.overflow = '';
  currentCoachId = null;
}

// ── UTILS ──
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type?' '+type:'');
  setTimeout(() => { t.className = 'toast'; }, 3200);
}

const _finState = { teams: [] };

async function finApiFetch(path, opts = {}) {
  const res = await fetch(`${API_BASE}${path}`, {
    ...opts,
    headers: { ...(opts.headers || {}), 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` },
  });
  if (res.status === 401 || res.status === 403) { doLogout(); throw new Error('Session expired'); }
  if (!res.ok) { const b = await res.json().catch(()=>({})); throw new Error(b.message || `Request failed (${res.status})`); }
  return res.json();
}

const finFmtMoney = n => '$' + (Number(n)||0).toLocaleString('en-US',{maximumFractionDigits:0});
function finFmtDate(s) { if(!s) return '—'; const d=new Date(s); return isNaN(d)?'—':d.toLocaleDateString(); }

async function finBootstrap() {
  try {
    const { teams } = await finApiFetch('/api/admin/fin/teams');
    _finState.teams = teams || [];
    finPopulateDropdown();
  } catch(err) { _finState.teams = []; }
  await finRenderContent();
}

function finPopulateDropdown() {
  const sel = document.getElementById('fin-team-select');
  if (!sel) return;
  sel.innerHTML = '<option value="">Select Team…</option>' +
    _finState.teams.map(t => `<option value="${t.id}">${esc(t.name)}</option>`).join('');
  sel.value = _finCurrentView !== 'org' ? String(_finCurrentView) : '';
  sel.classList.toggle('active', _finCurrentView !== 'org');
}

function finOnTeamChange(val) {
  finSwitchView(val || 'org');

async function finSwitchView(view) {
  _finCurrentView = view;
  document.getElementById('fin-org-btn').classList.toggle('active', view === 'org');
  const sel = document.getElementById('fin-team-select');
  if (sel) { sel.value = view !== 'org' ? String(view) : ''; sel.classList.toggle('active', view !== 'org'); }
  await finRenderContent();
}

async function finRenderContent() {
  const wrapper = document.getElementById('fin-content-wrapper');
  if (!wrapper) return;
  if (_finCurrentView === 'org') {
    wrapper.innerHTML = await finRenderOrgDashboard();

// ── TEAM DASHBOARD ────────────────────────────────────
async function finRenderTeamDashboard(coachId) {
  let team = null, errMsg = null;
  try { team = await finApiFetch(`/api/admin/fin/teams/${coachId}`); }
  catch(e) { errMsg = e.message||'Failed to load team'; }
  if (errMsg) return `<div class="fin-error"><span>⚠️ ${esc(errMsg)}</span><button class="fin-retry" onclick="finRenderContent()">Retry</button></div>`;
  const pct = team.budget>0 ? Math.min(100,(team.totalCollected/team.budget*100)).toFixed(1) : '0.0';
  let dlDate='—', dlUrgency=null;
  if (team.paymentDeadline) {
    const dl=new Date(team.paymentDeadline);
    if (!isNaN(dl)) {
      dlDate=dl.toLocaleDateString();
      const today=new Date(); today.setHours(0,0,0,0);
      const dlm=new Date(dl); dlm.setHours(0,0,0,0);
      const days=Math.round((dlm-today)/86400000);
      dlUrgency=days>0?`${days} day${days===1?'':'s'} to deadline`:days===0?'Deadline today':`${Math.abs(days)} day${Math.abs(days)===1?'':'s'} overdue`;
    }
  }
  const hasBudget=team.budget>0, budgetGap=hasBudget?Math.max(0,team.budget-team.totalCollected):null, budgetReached=hasBudget&&budgetGap===0;
  const CIRC=503, arcOf=$=>hasBudget?($/ team.budget)*CIRC:0;
  const cArc=Math.min(arcOf(team.totalCollected),CIRC), oArc=Math.min(arcOf(team.balanceRemaining),CIRC-cArc), pArc=Math.max(0,CIRC-cArc-oArc);
  const pAmt=hasBudget?Math.max(0,team.budget-team.totalCollected-team.balanceRemaining):0;
  return `
    <div class="fin-metrics-grid">
      <div class="fin-metric-card budget-card"><div class="fin-metric-icon">📄</div><div class="fin-metric-body"><span class="fin-metric-label">Team Budget</span><span class="fin-metric-value">${finFmtMoney(team.budget)}</span>${team.budget===0?'<span class="fin-metric-sub">No budget set</span>':''}</div></div>
      <div class="fin-metric-card"><div class="fin-metric-icon c-players">👥</div><div class="fin-metric-body"><span class="fin-metric-label">Players Registered &amp; Paid</span><span class="fin-metric-value">${team.goodStanding}/${team.totalRegistered}</span>${team.budgetedPlayers>0?`<span class="fin-metric-sub">Need ${team.budgetedPlayers} to meet budget</span>`:'<span class="fin-metric-sub">of registered players</span>'}</div></div>
      <div class="fin-metric-card"><div class="fin-metric-icon c-collected">💵</div><div class="fin-metric-body"><span class="fin-metric-label">Total Revenue Collected</span><span class="fin-metric-value">${finFmtMoney(team.totalCollected)}</span>${team.budget>0?`<span class="fin-metric-sub">${pct}% of budget</span>`:''}</div></div>
      <div class="fin-metric-card"><div class="fin-metric-icon c-balance">📈</div><div class="fin-metric-body"><span class="fin-metric-label">Balance to Meet Budget</span><span class="fin-metric-value">${hasBudget?finFmtMoney(budgetGap):'—'}</span><span class="fin-metric-sub">${!hasBudget?'No budget set':budgetReached?'✓ Budget reached':dlUrgency||'remaining to collect'}</span></div></div>
      <div class="fin-metric-card"><div class="fin-metric-icon c-good">✅</div><div class="fin-metric-body"><span class="fin-metric-label">Good Standing</span><span class="fin-metric-value">${team.goodStanding}</span><span class="fin-metric-sub">Current accounts</span></div></div>
      <div class="fin-metric-card alert-card"><div class="fin-metric-icon c-alert">⚠️</div><div class="fin-metric-body"><span class="fin-metric-label">Accounts in Red</span><span class="fin-metric-value">${team.deadlinePassed?team.accountsInRed:'—'}</span>${!team.paymentDeadline?'<span class="fin-metric-sub">No deadline set</span>':!team.deadlinePassed?'<span class="fin-metric-sub">Deadline not passed yet</span>':team.accountsInRed>0?'<span class="fin-metric-sub">Players with overdue balance</span>':'<span class="fin-metric-sub">✓ All accounts paid</span>'}</div></div>
      <div class="fin-metric-card"><div class="fin-metric-icon c-balance">💳</div><div class="fin-metric-body"><span class="fin-metric-label">Outstanding Balance</span><span class="fin-metric-value">${finFmtMoney(team.balanceRemaining)}</span><span class="fin-metric-sub">across registered players</span></div></div>
      <div class="fin-metric-card"><div class="fin-metric-icon c-deadline">📅</div><div class="fin-metric-body"><span class="fin-metric-label">Collection Deadline</span><span class="fin-metric-value">${dlDate}</span>${!team.paymentDeadline?'<span class="fin-metric-sub">No deadline set</span>':''}</div></div>
      ${hasBudget?`<div class="fin-metric-card chart-card"><div class="fin-metric-body" style="gap:.6rem">
        <span class="fin-metric-label">Budget Progress</span>
        <div class="fin-pie-wrap">
          <svg viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="80" fill="none" stroke="#dde2ea" stroke-width="40"/>
            <circle class="fin-seg" cx="100" cy="100" r="80" fill="none" stroke="#16a34a" stroke-width="40" stroke-dasharray="${cArc} ${CIRC}" transform="rotate(-90 100 100)" data-name="Collected" data-amount="${team.totalCollected}" data-percent="${(team.totalCollected/team.budget*100).toFixed(1)}"/>
            <circle class="fin-seg" cx="100" cy="100" r="80" fill="none" stroke="#c8102e" stroke-width="40" stroke-dasharray="${oArc} ${CIRC}" stroke-dashoffset="${-cArc}" transform="rotate(-90 100 100)" data-name="Owed by players" data-amount="${team.balanceRemaining}" data-percent="${(team.balanceRemaining/team.budget*100).toFixed(1)}"/>
            <circle class="fin-seg" cx="100" cy="100" r="80" fill="none" stroke="#b45309" stroke-width="40" stroke-dasharray="${pArc} ${CIRC}" stroke-dashoffset="${-(cArc+oArc)}" transform="rotate(-90 100 100)" data-name="Pending to budget" data-amount="${pAmt}" data-percent="${(pAmt/team.budget*100).toFixed(1)}"/>
            <text x="100" y="95" text-anchor="middle" font-size="26" font-weight="700" font-family="Oswald" fill="#0d1f38">${pct}%</text>
            <text x="100" y="118" text-anchor="middle" font-size="11" font-family="Oswald" letter-spacing="2" fill="#7a8499">COLLECTED</text>
          </svg>
          <div class="fin-chart-tt" id="fin-chart-tt"><span class="ftt-lbl"></span><span class="ftt-amt"></span><span class="ftt-pct"></span></div>
        </div>
        <div class="fin-legend">
          <div class="fin-legend-item"><span class="fin-legend-dot lc"></span><span>Collected: ${finFmtMoney(team.totalCollected)}</span></div>
          <div class="fin-legend-item"><span class="fin-legend-dot lb"></span><span>Owed: ${finFmtMoney(team.balanceRemaining)}</span></div>
          <div class="fin-legend-item"><span class="fin-legend-dot lp"></span><span>Pending: ${finFmtMoney(pAmt)}</span></div>
        </div>
      </div></div>`:''}
    </div>
    <div class="fin-section-card">
      <div class="fin-section-head">
        <h2>Payments from Ambassadors Baseball</h2>
        <button class="fin-nav-btn" onclick="finTogglePayoutForm('${coachId}')">+ Add Payment</button>
      </div>
      <div class="fin-section-body">
        <div id="fin-payout-form-${coachId}" style="display:none;background:var(--light);border-radius:8px;padding:1.2rem 1.3rem;margin-bottom:1.2rem;border:1.5px solid var(--mid);">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-bottom:.9rem;">
            <div style="display:flex;flex-direction:column;gap:.35rem;"><label style="font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);">Date Paid</label><input type="date" id="fin-payout-date-${coachId}" style="padding:9px 11px;border:1.5px solid var(--mid);border-radius:6px;font-family:'Source Sans 3',sans-serif;font-size:.88rem;outline:none;"/></div>
            <div style="display:flex;flex-direction:column;gap:.35rem;"><label style="font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);">Amount</label><input type="number" placeholder="0.00" min="0" step="0.01" id="fin-payout-amount-${coachId}" style="padding:9px 11px;border:1.5px solid var(--mid);border-radius:6px;font-family:'Source Sans 3',sans-serif;font-size:.88rem;outline:none;"/></div>
          </div>
          <div style="display:flex;flex-direction:column;gap:.35rem;margin-bottom:.9rem;"><label style="font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);">Notes</label><textarea id="fin-payout-notes-${coachId}" placeholder="Payment notes…" rows="2" style="padding:9px 11px;border:1.5px solid var(--mid);border-radius:6px;font-family:'Source Sans 3',sans-serif;font-size:.88rem;outline:none;resize:vertical;"></textarea></div>
          <div style="display:flex;gap:.5rem;justify-content:flex-end;">
            <button onclick="finTogglePayoutForm('${coachId}')" style="padding:8px 16px;border:1.5px solid var(--mid);border-radius:6px;background:var(--white);font-family:'Oswald',sans-serif;font-size:.76rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;">Cancel</button>
            <button id="fin-payout-submit-${coachId}" onclick="finSubmitPayout('${coachId}')" style="padding:8px 16px;border:none;border-radius:6px;background:var(--navy);color:var(--white);font-family:'Oswald',sans-serif;font-size:.76rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;">Submit Payment</button>
          </div>
        </div>
        <div id="fin-payout-body-${coachId}"><div style="text-align:center;padding:1.5rem;color:var(--muted);">Loading…</div></div>
      </div>
    </div>
    <div class="fin-section-card">
      <div class="fin-section-head">
        <h2>Player Financial Accounts</h2>
        <div class="fin-controls">
          <div class="fin-search"><span>🔍</span><input type="text" placeholder="Search players…" id="fin-player-search-${coachId}" oninput="finOnPlayerFilter('${coachId}')"/></div>
          <select class="fin-filter" id="fin-player-filter-${coachId}" onchange="finOnPlayerFilter('${coachId}')">
            <option value="all">All Players</option><option value="paid">Paid in Full</option><option value="partial">Partial</option>
          </select>
        </div>
      </div>
      <div class="fin-section-body" style="padding-bottom:0;">
        <div style="overflow-x:auto;">
          <table class="fin-tbl">
            <thead><tr><th>Player Name</th><th>Total Fee</th><th>Paid Amount</th><th>Balance Due</th><th>Last Payment</th><th>Status</th></tr></thead>
            <tbody id="fin-player-tbody-${coachId}"><tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--muted);">Loading…</td></tr></tbody>
          </table>
        </div>
      </div>
      <div class="fin-pagination" id="fin-player-pag-${coachId}"></div>
    </div>

`;
}

// ── PAYOUTS ───────────────────────────────────────────
async function finRenderPayouts(coachId) {
  const body = document.getElementById(`fin-payout-body-${coachId}`);
  if (!body) return;
  let data;
  try { data = await finApiFetch(`/api/admin/fin/teams/${coachId}/payouts`); }
  catch(e) { body.innerHTML=`<div style="text-align:center;padding:1.5rem;color:var(--red);">${esc(e.message||'Failed to load')}</div>`; return; }
  const { totalOwedToCoach, totalPaidToCoach, balanceToBePaid, payouts } = data;
  body.innerHTML = `
    <div style="display:flex;gap:2rem;flex-wrap:wrap;background:var(--light);border-radius:8px;padding:1rem 1.3rem;margin-bottom:1.2rem;border:1px solid var(--mid);">
      <div><div style="font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);">Total Owed to Coach</div><div style="font-family:'Oswald',sans-serif;font-size:1.3rem;font-weight:700;color:#16a34a;">${finFmtMoney(totalOwedToCoach)}</div></div>
      <div><div style="font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);">Total Paid to Coach</div><div style="font-family:'Oswald',sans-serif;font-size:1.3rem;font-weight:700;color:#16a34a;">${finFmtMoney(totalPaidToCoach)}</div></div>
      <div><div style="font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);">Balance to be Paid</div><div style="font-family:'Oswald',sans-serif;font-size:1.3rem;font-weight:700;color:${balanceToBePaid>0?'#c8102e':'#16a34a'};">${finFmtMoney(Math.abs(balanceToBePaid))}${balanceToBePaid<0?' (over-paid)':''}</div></div>
    </div>
    ${payouts.length===0
      ? `<p style="text-align:center;padding:.75rem 0;color:var(--muted);font-size:.85rem;">No payments recorded yet.</p>`
      : `<div style="overflow-x:auto;"><table class="fin-tbl"><thead><tr><th>Date Paid</th><th>Amount</th><th>Notes</th></tr></thead><tbody>${payouts.map(p=>`<tr><td>${finFmtDate(p.date)}</td><td class="f-paid">${finFmtMoney(p.amount)}</td><td>${esc(p.notes)}</td></tr>`).join('')}</tbody></table></div>`}`;
}

function finTogglePayoutForm(coachId) {
  const f = document.getElementById(`fin-payout-form-${coachId}`);
  if (f) f.style.display = f.style.display === 'none' ? '' : 'none';
}

async function finSubmitPayout(coachId) {
  const date = document.getElementById(`fin-payout-date-${coachId}`).value;
  const amount = document.getElementById(`fin-payout-amount-${coachId}`).value;
  const notes = document.getElementById(`fin-payout-notes-${coachId}`).value;
  if (!date || !amount) { showToast('Please fill in date and amount', 'red'); return; }
  const btn = document.getElementById(`fin-payout-submit-${coachId}`);
  btn.disabled=true; btn.textContent='Saving…';
  try {
    await finApiFetch(`/api/admin/fin/teams/${coachId}/payouts`, { method:'POST', body: JSON.stringify({ date, amount: parseFloat(amount), notes }) });
    document.getElementById(`fin-payout-date-${coachId}`).value='';
    document.getElementById(`fin-payout-amount-${coachId}`).value='';
    document.getElementById(`fin-payout-notes-${coachId}`).value='';
    document.getElementById(`fin-payout-form-${coachId}`).style.display='none';
    await finRenderPayouts(coachId);
    showToast('Payment saved', 'green');
  } catch(e) { showToast(e.message||'Failed to save', 'red'); }
  finally { btn.disabled=false; btn.textContent='Submit Payment'; }
}

// ── CHART HOVER ───────────────────────────────────────
function finBindChartHover() {
  const tt = document.getElementById('fin-chart-tt');
  if (!tt) return;
  const lbl=tt.querySelector('.ftt-lbl'), amt=tt.querySelector('.ftt-amt'), pct=tt.querySelector('.ftt-pct');
  const host=tt.parentElement;
  document.querySelectorAll('.fin-seg').forEach(seg => {
    seg.addEventListener('mouseenter', () => { lbl.textContent=seg.dataset.name; amt.textContent=finFmtMoney(seg.dataset.amount); pct.textContent=`· ${seg.dataset.percent}% of budget`; tt.classList.add('show'); });
    seg.addEventListener('mousemove', e => {
      const r=host.getBoundingClientRect(); let x=e.clientX-r.left+14, y=e.clientY-r.top+14;
      if(x+tt.offsetWidth>r.width)  x=e.clientX-r.left-tt.offsetWidth-14;
      if(y+tt.offsetHeight>r.height) y=e.clientY-r.top-tt.offsetHeight-14;
      tt.style.left=`${Math.max(0,x)}px`; tt.style.top=`${Math.max(0,y)}px`;
    });
    seg.addEventListener('mouseleave', () => tt.classList.remove('show'));
  });
}

// ── RANKINGS ─────────────────────────────────────────
let _finRankSort = 'budget';
function finOnRankingsSortChange(v) { _finRankSort=v; finRenderRankings(); }
async function finRenderRankings() {
  const host = document.getElementById('fin-rankings-host');
  if (!host) return;
  host.innerHTML=`<div style="text-align:center;padding:2rem;color:var(--muted);">Loading…</div>`;
  let ranks;
  try { const r=await finApiFetch(`/api/admin/fin/team-rankings?sortBy=${_finRankSort}`); ranks=r.rankings||[]; }
  catch(e) { host.innerHTML=`<div class="fin-error"><span>⚠️ ${esc(e.message||'Failed')}</span><button class="fin-retry" onclick="finRenderRankings()">Retry</button></div>`; return; }
  if (ranks.length===0) { host.innerHTML=`<div style="text-align:center;padding:2rem;color:var(--muted);">No active teams to rank.</div>`; return; }
  host.innerHTML=`<div class="fin-ranking-list">${ranks.map((t,i)=>`
    <div class="fin-ranking-card">
      <div class="fin-rank-num">${i+1}</div>
      <div class="fin-team-info"><h3>${esc(t.name)}</h3><p>Coach: ${esc(t.coach)}</p></div>
      <div class="fin-team-stats">
        <div class="fin-stat"><span class="fin-stat-lbl">Budget</span><span class="fin-stat-val">${finFmtMoney(t.budget)}</span></div>
        <div class="fin-stat"><span class="fin-stat-lbl">Collected</span><span class="fin-stat-val">${finFmtMoney(t.collected)}</span></div>
        <div class="fin-stat"><span class="fin-stat-lbl">% Done</span><span class="fin-stat-val">${t.percentCollected}%</span></div>
        <div class="fin-stat"><span class="fin-stat-lbl">Balance</span><span class="fin-stat-val">${finFmtMoney(t.balance)}</span></div>
      </div>
      ${t.completed?'<span class="fin-completed-badge">✓ Done</span>':''}
    </div>`).join('')}</div>`;
}

// ── OUTSTANDING BALANCES ──────────────────────────────
async function finRenderBalanceTable() {
  const p=_finPag.balance, tbody=document.getElementById('fin-balance-tbody'), pag=document.getElementById('fin-balance-pag');
  if (!tbody) return;
  tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--muted);">Loading…</td></tr>`;
  let result;
  try { result = await finApiFetch(`/api/admin/fin/outstanding-balances?page=${p.page}&perPage=${p.perPage}`); }
  catch(e) { tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--red);">${esc(e.message||'Failed')}</td></tr>`; if(pag)pag.innerHTML=''; return; }
  const {players,total}=result, totalPages=Math.max(1,Math.ceil(total/p.perPage));
  if(p.page>totalPages&&totalPages>0){p.page=totalPages;return finRenderBalanceTable();}
  tbody.innerHTML=players.length===0?`<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--muted);">No outstanding balances 🎉</td></tr>`:
    players.map(r=>`<tr><td class="f-name">${esc(r.name)}</td><td>${esc(r.team)}</td><td>${finFmtMoney(r.totalFee)}</td><td class="f-paid">${finFmtMoney(r.paidAmount)}</td><td class="f-balance">${finFmtMoney(r.balance)}</td><td><span class="fin-status ${r.status}">${r.status==='partial'?'Partial':'Unpaid'}</span></td></tr>`).join('');
  if(pag) finRenderPagination(pag,p,totalPages,total,np=>{p.page=np;finRenderBalanceTable();},np=>{p.perPage=np;p.page=1;finRenderBalanceTable();});
}

// ── PLAYER TABLE ──────────────────────────────────────
async function finRenderPlayerTable(coachId) {
  const ps=_finPag.team[coachId]||(_finPag.team[coachId]={page:1,perPage:20});
  const searchEl=document.getElementById(`fin-player-search-${coachId}`), filterEl=document.getElementById(`fin-player-filter-${coachId}`);
  const search=searchEl?searchEl.value.trim():'', status=filterEl?filterEl.value:'all';
  const tbody=document.getElementById(`fin-player-tbody-${coachId}`), pag=document.getElementById(`fin-player-pag-${coachId}`);
  if(!tbody) return;
  tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--muted);">Loading…</td></tr>`;
  const qs=new URLSearchParams({page:ps.page,perPage:ps.perPage});
  if(search) qs.set('search',search);
  if(status&&status!=='all') qs.set('status',status);
  let result;
  try { result=await finApiFetch(`/api/admin/fin/teams/${coachId}/players?${qs}`); }
  catch(e){ tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--red);">${esc(e.message||'Failed')}</td></tr>`; if(pag)pag.innerHTML=''; return; }
  const {players,total}=result, totalPages=Math.max(1,Math.ceil(total/ps.perPage));
  if(ps.page>totalPages&&totalPages>0){ps.page=totalPages;return finRenderPlayerTable(coachId);}
  tbody.innerHTML=players.length===0?`<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--muted);">No players match filters.</td></tr>`:
    players.map(p=>`<tr><td class="f-name">${esc(p.name)}</td><td>${finFmtMoney(p.totalFee)}</td><td class="f-paid">${finFmtMoney(p.paidAmount)}</td><td class="f-balance">${finFmtMoney(p.balance)}</td><td>${finFmtDate(p.lastPayment)}</td><td><span class="fin-status ${p.status}">${p.status==='paid'?'Paid':p.status==='partial'?'Partial':'Unpaid'}</span></td></tr>`).join('');
  if(pag) finRenderPagination(pag,ps,totalPages,total,np=>{ps.page=np;finRenderPlayerTable(coachId);},np=>{ps.perPage=np;ps.page=1;finRenderPlayerTable(coachId);});
  finRenderPayouts(coachId);
}

let _finPlayerFilterTimer=null;
function finOnPlayerFilter(coachId) {
  const ps=_finPag.team[coachId]||(_finPag.team[coachId]={page:1,perPage:20}); ps.page=1;
  clearTimeout(_finPlayerFilterTimer); _finPlayerFilterTimer=setTimeout(()=>finRenderPlayerTable(coachId),250);
}

// ── PAGINATION ────────────────────────────────────────
function finRenderPagination(el,state,totalPages,totalItems,onPage,onPerPage) {
  el._fp=onPage; el._fpp=onPerPage;
  el.innerHTML=`
    <div class="fin-pagination-info">Page ${state.page} of ${totalPages} &middot; ${totalItems} total</div>
    <div class="fin-pagination-controls">
      <select class="fin-per-page" onchange="(function(c,v){c._fpp(parseInt(v,10));})(this.closest('.fin-pagination'),this.value)">
        <option value="20" ${state.perPage===20?'selected':''}>20</option>
        <option value="50" ${state.perPage===50?'selected':''}>50</option>
        <option value="100" ${state.perPage===100?'selected':''}>100</option>
      </select>
      <button class="fin-page-btn" ${state.page<=1?'disabled':''} onclick="(function(c){c._fp(${state.page-1});})(this.closest('.fin-pagination'))">Prev</button>
      <button class="fin-page-btn current">${state.page}</button>
      <button class="fin-page-btn" ${state.page>=totalPages?'disabled':''} onclick="(function(c){c._fp(${state.page+1});})(this.closest('.fin-pagination'))">Next</button>
    </div>`;
}

// ── INIT ──
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// Auto-login if token exists
if (adminToken) {
  fetch(`${API_BASE}/api/admin/coaches`, { headers: adminH() }).then(r => {
    if (r.ok) showApp(); else doLogout();
  }).catch(() => doLogout());
} 
</script>
