<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Management — Ambassadors Baseball</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Open+Sans:wght@300;400;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --navy: #0a1628; --navy2: #162845; --navy3: #0d1f38;
            --red: #c8102e; --red2: #a50d25;
            --white: #ffffff; --light: #f4f6f9; --mid: #dce3ec;
            --text: #1a1a2e; --sub: #5a6a7a; --muted: #7a8499;
            --color-collected: #16a34a; --color-balance: #c8102e;
            --color-warning: #b45309; --color-success: #16a34a; --color-alert: #c8102e;
            --shadow-sm: 0 1px 3px 0 rgba(0,0,0,.07);
            --shadow-md: 0 2px 12px rgba(0,0,0,.07);
            --shadow-lg: 0 10px 28px rgba(0,0,0,.12);
        }
        body { font-family: 'Open Sans', sans-serif; background: var(--light); min-height: 100vh; color: var(--text); }

        /* ── NAV ── */
        .main-nav {
            background: var(--navy); padding: 0 28px; min-height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 2px 12px rgba(0,0,0,.25); flex-wrap: wrap; gap: 1rem;
        }
        .nav-brand {
            display: flex; align-items: center; gap: .75rem;
            font-family: 'Oswald', sans-serif; font-size: 1.15rem; font-weight: 700;
            color: var(--white); letter-spacing: .1em; text-transform: uppercase; padding: 12px 0;
        }
        .brand-icon { background: var(--red); width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
        .brand-accent { color: var(--red); }
        .nav-controls { display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; padding: 10px 0; }
        .nav-btn {
            background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15);
            color: rgba(255,255,255,.9); padding: 8px 16px; border-radius: 6px; cursor: pointer;
            transition: all .15s; font-family: 'Oswald', sans-serif; font-size: .78rem;
            font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
        }
        .nav-btn:hover { background: rgba(255,255,255,.18); color: var(--white); }
        .nav-btn.active { background: var(--red); border-color: var(--red); color: var(--white); box-shadow: 0 2px 8px rgba(200,16,46,.35); }
        .team-select-wrap { position: relative; display: inline-flex; align-items: center; }
        .team-select {
            appearance: none; -webkit-appearance: none;
            background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15);
            color: var(--white); padding: 8px 38px 8px 16px; border-radius: 6px; cursor: pointer;
            font-family: 'Oswald', sans-serif; font-size: .78rem; font-weight: 600;
            letter-spacing: .08em; text-transform: uppercase; outline: none; transition: all .15s; min-width: 200px;
        }
        .team-select:hover { background: rgba(255,255,255,.18); }
        .team-select.active { background: var(--red); border-color: var(--red); box-shadow: 0 2px 8px rgba(200,16,46,.35); }
        .team-select option { background: var(--navy); color: var(--white); font-family: 'Open Sans', sans-serif; text-transform: none; letter-spacing: 0; }
        .team-select-wrap::after { content: '▼'; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: .65rem; color: rgba(255,255,255,.7); pointer-events: none; }
        .logout-btn {
            background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15);
            color: rgba(255,255,255,.9); padding: 8px 14px; border-radius: 6px; cursor: pointer;
            transition: all .15s; font-family: 'Oswald', sans-serif; font-size: .72rem;
            font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
        }
        .logout-btn:hover { background: rgba(200,16,46,.5); }

        /* ── PAGE HEADER ── */
        .page-header { background: linear-gradient(135deg,#1a3fc4 0%,#1535a8 100%); padding: 2rem 2rem 1.6rem; position: relative; overflow: hidden; }
        .page-header::before { content: ''; position: absolute; inset: 0; background: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E"); }
        .page-header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 1rem; position: relative; flex-wrap: wrap; }
        .page-header h1 { font-family: 'Oswald', sans-serif; font-size: clamp(1.4rem,3vw,2rem); font-weight: 700; color: var(--white); letter-spacing: .04em; text-transform: uppercase; }
        .coach-name { color: rgba(255,255,255,.7); font-size: .85rem; margin-top: .3rem; font-weight: 500; }

        /* ── MAIN ── */
        .main-content { max-width: 1400px; margin: 0 auto; padding: 2rem 1.5rem 3rem; }

        /* ── BUTTONS ── */
        .btn-primary, .btn-secondary { display: inline-flex; align-items: center; gap: .5rem; padding: 10px 18px; border-radius: 6px; font-family: 'Oswald', sans-serif; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; transition: all .15s; border: 1.5px solid transparent; font-size: .78rem; white-space: nowrap; }
        .btn-primary { background: var(--navy); color: var(--white); border-color: var(--navy); }
        .btn-primary:hover { background: var(--navy2); }
        .btn-secondary { background: rgba(255,255,255,.15); color: var(--white); border-color: rgba(255,255,255,.25); }
        .btn-secondary:hover { background: rgba(255,255,255,.26); }
        .btn-secondary.light { background: var(--white); color: var(--navy); border-color: var(--mid); }
        .btn-secondary.light:hover { border-color: var(--navy); }

        /* ── METRICS ── */
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(260px,1fr)); gap: 1rem; margin-bottom: 2rem; }
        .metrics-grid.org { grid-template-columns: repeat(auto-fit,minmax(230px,1fr)); }
        .metric-card { background: var(--white); border-radius: 8px; padding: 1.25rem 1.4rem; box-shadow: var(--shadow-md); border: 1px solid var(--mid); display: flex; gap: 1rem; transition: all .2s; align-items: flex-start; }
        .metric-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
        .metric-card.budget-card { background: linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%); color: var(--white); border-color: var(--navy); position: relative; overflow: hidden; }
        .metric-card.budget-card::after { content: ''; position: absolute; right: -40px; bottom: -40px; width: 140px; height: 140px; border-radius: 50%; background: rgba(200,16,46,.18); pointer-events: none; }
        .metric-card.alert-card { background: linear-gradient(135deg,#fef3f5 0%,#fde8ec 100%); border-color: #f5c6cb; }
        .metric-card.chart-card { grid-column: span 2; }
        .metric-icon { width: 46px; height: 46px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: rgba(10,22,40,.08); color: var(--navy); font-size: 1.3rem; position: relative; z-index: 1; }
        .budget-card .metric-icon { background: rgba(255,255,255,.15); color: var(--white); }
        .metric-icon.players { background: rgba(59,130,246,.12); color: #2563eb; }
        .metric-icon.collected { background: rgba(22,163,74,.12); color: var(--color-collected); }
        .metric-icon.balance { background: rgba(200,16,46,.12); color: var(--color-balance); }
        .metric-icon.good { background: rgba(22,163,74,.12); color: var(--color-success); }
        .metric-icon.alert { background: rgba(200,16,46,.12); color: var(--color-alert); }
        .metric-icon.deadline { background: rgba(180,83,9,.12); color: var(--color-warning); }
        .metric-icon.teams { background: rgba(124,58,237,.12); color: #7c3aed; }
        .metric-icon.profit { background: rgba(245,197,24,.18); color: #b45309; }
        .metric-content { display: flex; flex-direction: column; gap: .3rem; flex: 1; position: relative; z-index: 1; min-width: 0; }
        .metric-content.full { gap: .75rem; }
        .metric-label { font-size: .7rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--sub); }
        .budget-card .metric-label { color: rgba(255,255,255,.7); }
        .metric-value { font-family: 'Oswald', sans-serif; font-size: 1.7rem; font-weight: 700; color: var(--navy); line-height: 1.1; letter-spacing: .02em; }
        .budget-card .metric-value { color: var(--white); }
        .metric-subtext { font-size: .78rem; color: var(--sub); }
        .budget-card .metric-subtext { color: rgba(255,255,255,.7); }
        .metric-link { display: inline-flex; align-items: center; gap: .25rem; color: var(--navy); font-family: 'Oswald', sans-serif; font-size: .72rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; background: none; border: none; cursor: pointer; margin-top: .4rem; padding: 0; transition: gap .2s; }
        .metric-link:hover { gap: .5rem; }
        .budget-card .metric-link { color: var(--white); }
        .metric-link.alert { color: var(--color-alert); }

        /* ── PIE CHART ── */
        .pie-chart { width: 200px; height: 200px; margin: .5rem auto; position: relative; }
        .chart-segment { cursor: pointer; pointer-events: stroke; transition: filter .15s ease; }
        .chart-segment:hover { filter: brightness(1.15); }
        .chart-tooltip { position: absolute; background: var(--navy); color: var(--white); padding: 8px 12px; border-radius: 6px; box-shadow: 0 4px 14px rgba(0,0,0,.25); pointer-events: none; opacity: 0; transition: opacity .12s ease; z-index: 10; white-space: nowrap; min-width: 140px; }
        .chart-tooltip.show { opacity: 1; }
        .chart-tooltip .tt-label { display: block; font-family: 'Oswald', sans-serif; font-size: .65rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.65); margin-bottom: 2px; }
        .chart-tooltip .tt-amount { font-family: 'Oswald', sans-serif; font-size: 1.05rem; font-weight: 700; letter-spacing: .02em; }
        .chart-tooltip .tt-percent { color: rgba(255,255,255,.7); font-size: .78rem; margin-left: .35rem; }
        .chart-legend { display: flex; justify-content: center; gap: 1.5rem; margin-top: .5rem; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: .5rem; font-size: .82rem; color: var(--text); }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
        .legend-dot.collected { background: var(--color-collected); }
        .legend-dot.balance   { background: var(--color-balance); }
        .legend-dot.pending   { background: var(--color-warning); }

        /* ── SECTION CARDS ── */
        .section-card { background: var(--white); border-radius: 8px; box-shadow: var(--shadow-md); border: 1px solid var(--mid); margin-bottom: 1.5rem; overflow: hidden; }
        .section-card-header { background: var(--red); padding: 12px 22px; display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; }
        .section-card-header h2 { font-family: 'Oswald', sans-serif; font-size: .95rem; font-weight: 600; color: var(--white); letter-spacing: .12em; text-transform: uppercase; }
        .section-card-body { padding: 1.4rem 1.5rem; }
        .controls { display: flex; gap: .75rem; align-items: center; flex-wrap: wrap; }
        .controls-light .search-box { background: rgba(255,255,255,.15); border-color: rgba(255,255,255,.25); color: var(--white); }
        .controls-light .search-box input { color: var(--white); }
        .controls-light .search-box input::placeholder { color: rgba(255,255,255,.7); }
        .controls-light .filter-select { background: rgba(255,255,255,.15); border-color: rgba(255,255,255,.25); color: var(--white); }
        .search-box { display: flex; align-items: center; gap: .5rem; background: var(--white); border: 1.5px solid var(--mid); border-radius: 6px; padding: 6px 14px; transition: border-color .2s; }
        .search-box:focus-within { border-color: var(--navy); }
        .search-box input { border: none; background: none; outline: none; font-family: 'Open Sans', sans-serif; font-size: .85rem; width: 200px; color: inherit; }
        .filter-select { padding: 7px 14px; border: 1.5px solid var(--mid); border-radius: 6px; background: var(--white); font-family: 'Open Sans', sans-serif; font-size: .82rem; cursor: pointer; outline: none; color: var(--text); transition: border-color .2s; }
        .filter-select:focus { border-color: var(--navy); }

        /* ── PAYMENT FORM ── */
        .payment-form { background: var(--light); border-radius: 8px; padding: 1.4rem 1.5rem; margin-bottom: 1.5rem; border: 1.5px solid var(--mid); display: none; }
        .payment-form.show { display: block; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        .form-group { display: flex; flex-direction: column; gap: .4rem; }
        .form-group label { font-size: .68rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--sub); }
        .form-group input, .form-group textarea { padding: 10px 12px; border: 1.5px solid var(--mid); border-radius: 6px; font-family: 'Open Sans', sans-serif; font-size: .88rem; outline: none; transition: border-color .2s, box-shadow .2s; background: var(--white); color: var(--text); }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(200,16,46,.08); }
        .form-group textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
        .form-actions { display: flex; gap: .6rem; justify-content: flex-end; margin-top: .4rem; }

        /* ── PAYMENT SUMMARY ── */
        .payment-summary { background: var(--light); border-radius: 8px; padding: 1.1rem 1.4rem; margin-bottom: 1.5rem; display: flex; gap: 3rem; flex-wrap: wrap; border: 1px solid var(--mid); }
        .summary-item { display: flex; justify-content: space-between; align-items: center; gap: 1.2rem; font-size: .88rem; }
        .summary-item > span:first-child { font-size: .72rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--sub); }
        .summary-item .amount { font-family: 'Oswald', sans-serif; font-size: 1.3rem; font-weight: 700; color: var(--color-collected); letter-spacing: .02em; }
        .summary-item .amount.balance { color: var(--color-balance); }

        /* ── TABLES ── */
        .table-wrap { overflow-x: auto; }
        .payment-table, .player-table { width: 100%; border-collapse: collapse; font-size: .86rem; }
        .payment-table thead tr, .player-table thead tr { background: var(--navy); }
        .payment-table th, .player-table th { padding: 11px 14px; text-align: left; font-family: 'Oswald', sans-serif; font-size: .72rem; font-weight: 600; color: var(--white); letter-spacing: .1em; text-transform: uppercase; white-space: nowrap; }
        .payment-table td, .player-table td { padding: 12px 14px; border-bottom: 1px solid var(--mid); font-size: .86rem; vertical-align: middle; }
        .payment-table tbody tr:last-child td, .player-table tbody tr:last-child td { border-bottom: none; }
        .payment-table tbody tr:hover, .player-table tbody tr:hover { background: var(--light); }
        .payment-table .amount, .player-table .amount { font-weight: 700; font-family: 'Oswald', sans-serif; }
        .player-table .paid    { color: var(--color-collected); font-weight: 700; font-family: 'Oswald', sans-serif; }
        .player-table .balance { color: var(--color-balance);   font-weight: 700; font-family: 'Oswald', sans-serif; }
        .player-name { font-weight: 600; color: var(--navy); }
        .status-badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 20px; font-family: 'Oswald', sans-serif; font-size: .68rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; border: 1px solid transparent; }
        .status-badge.paid    { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
        .status-badge.partial { background: #fffbea; color: #92400e; border-color: #fde68a; }
        .status-badge.unpaid  { background: #fef3f5; color: var(--red); border-color: #f5c6cb; }

        /* ── TEAM RANKINGS ── */
        .team-rankings { display: flex; flex-direction: column; gap: .85rem; }
        .ranking-card { display: flex; align-items: center; gap: 1.5rem; padding: 1.1rem 1.3rem; background: var(--light); border-radius: 8px; border: 1.5px solid var(--mid); transition: all .2s; position: relative; flex-wrap: wrap; }
        .ranking-card:hover { transform: translateX(4px); box-shadow: var(--shadow-md); border-color: var(--navy); }
        .rank-number { width: 48px; height: 48px; background: var(--navy); color: var(--white); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Oswald', sans-serif; font-size: 1.4rem; font-weight: 700; flex-shrink: 0; }
        .ranking-card:nth-child(1) .rank-number { background: var(--red); }
        .team-info { flex: 1; min-width: 180px; }
        .team-info h3 { font-family: 'Oswald', sans-serif; font-size: 1.05rem; font-weight: 700; color: var(--navy); margin-bottom: .2rem; letter-spacing: .03em; text-transform: uppercase; }
        .team-info p { font-size: .8rem; color: var(--sub); }
        .team-stats { display: flex; gap: 1.8rem; flex-wrap: wrap; }
        .stat { display: flex; flex-direction: column; gap: .2rem; }
        .stat-label { font-size: .65rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--sub); }
        .stat-value { font-family: 'Oswald', sans-serif; font-size: 1rem; font-weight: 700; color: var(--navy); letter-spacing: .02em; }
        .completed-badge { position: absolute; top: 12px; right: 12px; background: var(--color-success); color: var(--white); padding: 4px 10px; border-radius: 4px; font-family: 'Oswald', sans-serif; font-size: .65rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }

        /* ── PAGINATION ── */
        .pagination { display: flex; align-items: center; justify-content: space-between; gap: 1rem; padding: .85rem 1rem; border-top: 1px solid var(--mid); background: var(--white); flex-wrap: wrap; margin-top: -1px; }
        .pagination-info { font-size: .82rem; color: var(--sub); font-weight: 500; }
        .pagination-controls { display: flex; align-items: center; gap: .75rem; flex-wrap: wrap; }
        .per-page-select { position: relative; display: inline-flex; align-items: center; }
        .per-page-select select { appearance: none; -webkit-appearance: none; padding: 5px 28px 5px 12px; border: 1.5px solid var(--mid); border-radius: 6px; background: var(--white); font-family: 'Open Sans', sans-serif; font-size: .82rem; font-weight: 600; color: var(--text); cursor: pointer; outline: none; transition: border-color .15s; }
        .per-page-select select:hover, .per-page-select select:focus { border-color: var(--navy); }
        .per-page-select::after { content: '▼'; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: .55rem; color: var(--sub); pointer-events: none; }
        .page-btn { display: inline-flex; align-items: center; justify-content: center; min-width: 34px; height: 32px; padding: 0 10px; border: 1.5px solid var(--mid); border-radius: 6px; background: var(--white); font-family: 'Open Sans', sans-serif; font-size: .82rem; font-weight: 600; color: var(--text); cursor: pointer; transition: all .15s; }
        .page-btn:hover:not(:disabled) { border-color: var(--navy); color: var(--navy); }
        .page-btn.current { border-color: var(--red); color: var(--red); background: var(--white); cursor: default; }
        .page-btn:disabled { color: var(--mid); cursor: not-allowed; background: var(--light); }

        /* ── ERROR BANNER ── */
        .error-banner { background: #fef3f5; border: 1.5px solid #f5c6cb; border-radius: 8px; padding: .85rem 1.1rem; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; color: var(--red); font-size: .86rem; flex-wrap: wrap; }
        .error-banner .retry-btn { background: var(--red); color: var(--white); border: none; padding: 6px 14px; border-radius: 6px; font-family: 'Oswald', sans-serif; font-size: .72rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; transition: background .15s; }
        .error-banner .retry-btn:hover { background: var(--red2); }

        /* ── RESPONSIVE ── */
        @media (max-width: 1200px) { .metric-card.chart-card { grid-column: span 1; } }
        @media (max-width: 768px) {
            .main-nav { padding: 0 16px; }
            .main-content { padding: 1.25rem 1rem 2rem; }
            .page-header { padding: 1.5rem 1rem 1.2rem; }
            .page-header-inner { flex-direction: column; align-items: flex-start; }
            .metrics-grid { grid-template-columns: 1fr; }
            .team-stats { gap: 1rem; }
            .form-row { grid-template-columns: 1fr; }
            .payment-summary { flex-direction: column; gap: 1rem; }
            .controls { width: 100%; flex-direction: column; align-items: stretch; }
            .search-box, .search-box input, .filter-select { width: 100%; }
            .team-select { min-width: 100%; }
            .section-card-body { padding: 1.1rem 1rem; }
        }
    </style>
</head>
<body>

<nav class="main-nav">
    <div class="nav-brand">
        <div class="brand-icon">⚾</div>
        <span>Ambassadors<span class="brand-accent"> Baseball</span></span>
    </div>
    <div class="nav-controls" id="navControls"></div>
</nav>

<main id="contentWrapper"></main>

<script>
'use strict';

// ── CONFIG ────────────────────────────────────────────────────────
const API_BASE = 'https://backend-baseball-inky.vercel.app';

// ── AUTH — reads the token written by admin.html (key: admin_token) ──
let adminToken = localStorage.getItem('admin_token') || null;

if (!adminToken) {
    // Not logged in — send back to admin portal
    window.location.replace('admin.html');
}

function doLogout() {
    localStorage.removeItem('admin_token');
    window.location.replace('admin.html');
}

// ── API HELPER ────────────────────────────────────────────────────
async function apiFetch(path, opts = {}) {
    const res = await fetch(`${API_BASE}${path}`, {
        ...opts,
        headers: { ...(opts.headers || {}), Authorization: `Bearer ${adminToken}` },
    });
    if (res.status === 401 || res.status === 403) {
        doLogout();
        throw new Error('Session expired — please sign in again');
    }
    if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.message || `Request failed (${res.status})`);
    }
    return res.json();
}

}

// ── HELPERS ───────────────────────────────────────────────────────
function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
const fmtMoney = n => '$' + (Number(n) || 0).toLocaleString('en-US', { maximumFractionDigits: 0 });
function fmtDate(s) {
    if (!s) return '—';
    const d = new Date(s);
    return isNaN(d) ? '—' : d.toLocaleDateString();
}

    let team = null, errMsg = null;

    catch (err) { errMsg = err.message || 'Failed to load team'; }

    if (errMsg) return `
        <header class="page-header"><div class="page-header-inner"><div><h1>Team</h1><p class="coach-name">Could not load</p></div></div></header>
        <main class="main-content"><div class="error-banner"><span>⚠️ ${esc(errMsg)}</span><button class="retry-btn" onclick="renderContent()">Retry</button></div></main>`;

    const pct = team.budget > 0 ? Math.min(100, (team.totalCollected / team.budget * 100)).toFixed(1) : '0.0';
    let deadlineDate = '—', deadlineUrgency = null;
    if (team.paymentDeadline) {
        const dl = new Date(team.paymentDeadline);
        if (!isNaN(dl)) {
            deadlineDate = dl.toLocaleDateString();
            const today = new Date(); today.setHours(0,0,0,0);
            const dlMid = new Date(dl); dlMid.setHours(0,0,0,0);
            const days  = Math.round((dlMid - today) / 86400000);
            deadlineUrgency = days > 0 ? `${days} day${days===1?'':'s'} to deadline` : days === 0 ? 'Deadline today' : `${Math.abs(days)} day${Math.abs(days)===1?'':'s'} overdue`;
        }
    }
    const hasBudget     = team.budget > 0;
    const budgetGap     = hasBudget ? Math.max(0, team.budget - team.totalCollected) : null;
    const budgetReached = hasBudget && budgetGap === 0;
    const CIRC = 503;
    const arcOf = $ => hasBudget ? ($ / team.budget) * CIRC : 0;
    const collectedArc = Math.min(arcOf(team.totalCollected), CIRC);
    const owedArc      = Math.min(arcOf(team.balanceRemaining), CIRC - collectedArc);
    const pendingArc   = Math.max(0, CIRC - collectedArc - owedArc);

                <div class="metric-card"><div class="metric-icon collected">💵</div><div class="metric-content"><span class="metric-label">Total Revenue Collected</span><span class="metric-value">${fmtMoney(team.totalCollected)}</span>${team.budget>0?`<span class="metric-subtext">${pct}% of budget</span>`:''}</div></div>
                <div class="metric-card"><div class="metric-icon balance">📈</div><div class="metric-content"><span class="metric-label">Balance to Meet Budget</span><span class="metric-value">${hasBudget?fmtMoney(budgetGap):'—'}</span><span class="metric-subtext">${!hasBudget?'No budget set':budgetReached?'✓ Budget reached':deadlineUrgency||'remaining to collect'}</span></div></div>
                <div class="metric-card"><div class="metric-icon good">✅</div><div class="metric-content"><span class="metric-label">Good Standing</span><span class="metric-value">${team.goodStanding}</span><span class="metric-subtext">Current accounts</span></div></div>
                <div class="metric-card alert-card"><div class="metric-icon alert">⚠️</div><div class="metric-content"><span class="metric-label">Accounts in Red</span><span class="metric-value">${team.deadlinePassed?team.accountsInRed:'—'}</span>${!team.paymentDeadline?'<span class="metric-subtext">No deadline set</span>':!team.deadlinePassed?'<span class="metric-subtext">Deadline not passed yet</span>':team.accountsInRed>0?`<button class="metric-link alert" onclick="contactAccountsInRed('${coachId}')">Contact Immediately →</button>`:'<span class="metric-subtext">✓ All accounts paid</span>'}</div></div>
                <div class="metric-card"><div class="metric-icon players">💳</div><div class="metric-content"><span class="metric-label">Outstanding Balance from Paying Players</span><span class="metric-value">${fmtMoney(team.balanceRemaining)}</span><span class="metric-subtext">across registered players</span></div></div>
                <div class="metric-card"><div class="metric-icon deadline">📅</div><div class="metric-content"><span class="metric-label">Collection Deadline</span><span class="metric-value">${deadlineDate}</span>${!team.paymentDeadline?'<span class="metric-subtext">No deadline set</span>':''}</div></div>
                ${team.budget>0?`
                <div class="metric-card chart-card">
                    <div class="metric-content full">
                        <span class="metric-label">Budget Progress</span>
                        <div class="pie-chart">
                            <svg viewBox="0 0 200 200">
                                <circle cx="100" cy="100" r="80" fill="none" stroke="var(--mid)" stroke-width="40"/>
                                <circle class="chart-segment" cx="100" cy="100" r="80" fill="none" stroke="var(--color-collected)" stroke-width="40" stroke-dasharray="${collectedArc} ${CIRC}" transform="rotate(-90 100 100)" data-name="Collected" data-amount="${team.totalCollected}" data-percent="${(team.totalCollected/team.budget*100).toFixed(1)}"/>
                                <circle class="chart-segment" cx="100" cy="100" r="80" fill="none" stroke="var(--color-balance)" stroke-width="40" stroke-dasharray="${owedArc} ${CIRC}" stroke-dashoffset="${-collectedArc}" transform="rotate(-90 100 100)" data-name="Owed by players" data-amount="${team.balanceRemaining}" data-percent="${(team.balanceRemaining/team.budget*100).toFixed(1)}"/>
                                <circle class="chart-segment" cx="100" cy="100" r="80" fill="none" stroke="var(--color-warning)" stroke-width="40" stroke-dasharray="${pendingArc} ${CIRC}" stroke-dashoffset="${-(collectedArc+owedArc)}" transform="rotate(-90 100 100)" data-name="Pending to budget" data-amount="${pendingAmt}" data-percent="${(pendingAmt/team.budget*100).toFixed(1)}"/>
                                <text x="100" y="95" text-anchor="middle" font-size="26" font-weight="700" font-family="Oswald" fill="var(--navy)">${pct}%</text>

                            <div class="legend-item"><span class="legend-dot pending"></span><span>Pending to budget: ${fmtMoney(pendingAmt)}</span></div>

                <div class="section-card-body">

function togglePayoutForm(coachId) {
    const f = document.getElementById(`payoutForm-${coachId}`);
    if (f) f.classList.toggle('show');
}

async function submitPayout(coachId) {
    const date   = document.getElementById(`payoutDate-${coachId}`).value;
    const amount = document.getElementById(`payoutAmount-${coachId}`).value;
    const notes  = document.getElementById(`payoutNotes-${coachId}`).value;
    if (!date || !amount) { alert('Please fill in date and amount'); return; }
    const btn = document.getElementById(`payoutSubmitBtn-${coachId}`);
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
        await submitCoachPayout(coachId, { date, amount: parseFloat(amount), notes });
        document.getElementById(`payoutDate-${coachId}`).value   = '';
        document.getElementById(`payoutAmount-${coachId}`).value = '';
        document.getElementById(`payoutNotes-${coachId}`).value  = '';
        document.getElementById(`payoutForm-${coachId}`).classList.remove('show');
        await renderCoachPayoutsSection(coachId);
    } catch (err) { alert(err.message || 'Failed to save payment'); }
    finally { btn.disabled = false; btn.textContent = 'Submit Payment'; }
}

// ── CHART HOVER ───────────────────────────────────────────────────
function bindChartHover() {
    const tooltip = document.getElementById('chartTooltip');
    if (!tooltip) return;
    const ttLabel = tooltip.querySelector('.tt-label'), ttAmount = tooltip.querySelector('.tt-amount'), ttPercent = tooltip.querySelector('.tt-percent');
    const host    = tooltip.parentElement;
    document.querySelectorAll('.chart-segment').forEach(seg => {
        seg.addEventListener('mouseenter', () => {
            ttLabel.textContent = seg.dataset.name; ttAmount.textContent = fmtMoney(seg.dataset.amount); ttPercent.textContent = `· ${seg.dataset.percent}% of budget`; tooltip.classList.add('show');
        });
        seg.addEventListener('mousemove', e => {
            const rect = host.getBoundingClientRect();
            let x = e.clientX - rect.left + 14, y = e.clientY - rect.top + 14;
            if (x + tooltip.offsetWidth  > rect.width)  x = e.clientX - rect.left - tooltip.offsetWidth  - 14;
            if (y + tooltip.offsetHeight > rect.height) y = e.clientY - rect.top  - tooltip.offsetHeight - 14;
            tooltip.style.left = `${Math.max(0,x)}px`; tooltip.style.top = `${Math.max(0,y)}px`;
        });
        seg.addEventListener('mouseleave', () => tooltip.classList.remove('show'));
    });
}

async function renderAccountsInRedTable(coachId) {
    const body = document.getElementById(`accountsInRedBody-${coachId}`);
    if (!body) return;
    body.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--sub);">Loading overdue accounts…</div>`;
    let players;
    try { const r = await fetchTeamPlayers(coachId, { page:1, perPage:100, search:'', status:'overdue' }); players = r.players || []; }
    catch (err) { body.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--red);">${esc(err.message||'Failed to load')}</div>`; return; }
    if (players.length===0) { body.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--color-collected);">✓ No overdue accounts found.</div>`; return; }
    body.innerHTML = `<div class="table-wrap"><table class="player-table"><thead><tr><th>Player Name</th><th>Total Fee</th><th>Amount Paid</th><th>Balance Due</th><th>Last Payment</th><th>Status</th></tr></thead><tbody>${players.map(p=>`<tr><td class="player-name">${esc(p.name)}</td><td>${fmtMoney(p.totalFee)}</td><td class="paid">${fmtMoney(p.paidAmount)}</td><td class="balance">${fmtMoney(p.balance)}</td><td>${fmtDate(p.lastPayment)}</td><td><span class="status-badge ${p.status}">${p.status==='partial'?'Partial':'Unpaid'}</span></td></tr>`).join('')}</tbody></table></div>`;
}

// ── PLAYER TABLE ──────────────────────────────────────────────────
async function renderTeamPlayerTable(coachId) {
    const pState   = paginationState.team[coachId] || (paginationState.team[coachId] = { page:1, perPage:20 });
    const searchEl = document.getElementById(`playerSearch-${coachId}`);
    const filterEl = document.getElementById(`playerFilter-${coachId}`);
    const search   = searchEl ? searchEl.value.trim() : '';
    const status   = filterEl ? filterEl.value : 'all';
    const tbody    = document.getElementById(`playerTableBody-${coachId}`);
    if (!tbody) return;
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--sub);">Loading…</td></tr>`;
    let result;
    try { result = await fetchTeamPlayers(coachId, { page: pState.page, perPage: pState.perPage, search, status }); }
    catch (err) { tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--red);">${esc(err.message||'Failed to load')}</td></tr>`; document.getElementById(`playerPagination-${coachId}`).innerHTML=''; return; }
    const { players, total } = result;
    const totalPages = Math.max(1, Math.ceil(total / pState.perPage));
    if (pState.page > totalPages && totalPages > 0) { pState.page = totalPages; return renderTeamPlayerTable(coachId); }
    tbody.innerHTML = players.length===0
        ? `<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--sub);">No players match your filters.</td></tr>`
        : players.map(p=>`<tr><td class="player-name">${esc(p.name)}</td><td>${fmtMoney(p.totalFee)}</td><td class="paid">${fmtMoney(p.paidAmount)}</td><td class="balance">${fmtMoney(p.balance)}</td><td>${fmtDate(p.lastPayment)}</td><td><span class="status-badge ${p.status}">${p.status==='paid'?'Paid':p.status==='partial'?'Partial':'Unpaid'}</span></td></tr>`).join('');
    renderPagination(`playerPagination-${coachId}`, pState, totalPages, total,
        np => { pState.page=np; renderTeamPlayerTable(coachId); },
        np => { pState.perPage=np; pState.page=1; renderTeamPlayerTable(coachId); });
}

// ── OUTSTANDING BALANCES ──────────────────────────────────────────
async function renderBalanceTable() {
    const pState = paginationState.balance;
    const tbody  = document.getElementById('balanceTableBody');
    if (!tbody) return;
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--sub);">Loading…</td></tr>`;
    let result;
    try { result = await fetchOutstandingBal({ page: pState.page, perPage: pState.perPage }); }
    catch (err) { tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--red);">${esc(err.message||'Failed to load')}</td></tr>`; document.getElementById('balancePagination').innerHTML=''; return; }
    const { players, total } = result;
    const totalPages = Math.max(1, Math.ceil(total / pState.perPage));
    if (pState.page > totalPages && totalPages > 0) { pState.page = totalPages; return renderBalanceTable(); }
    tbody.innerHTML = players.length===0
        ? `<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--sub);">No outstanding balances 🎉</td></tr>`
        : players.map(p=>`<tr><td class="player-name">${esc(p.name)}</td><td>${esc(p.team)}</td><td>${fmtMoney(p.totalFee)}</td><td class="paid">${fmtMoney(p.paidAmount)}</td><td class="balance">${fmtMoney(p.balance)}</td><td><span class="status-badge ${p.status}">${p.status==='partial'?'Partial':'Unpaid'}</span></td></tr>`).join('');
    renderPagination('balancePagination', pState, totalPages, total,
        np => { pState.page=np; renderBalanceTable(); },
        np => { pState.perPage=np; pState.page=1; renderBalanceTable(); });
}

// ── TEAM RANKINGS ─────────────────────────────────────────────────
let rankingsSortBy = 'budget';
function onRankingsSortChange(sortBy) { rankingsSortBy = sortBy; renderTeamRankings(); }

async function renderTeamRankings() {
    const host = document.getElementById('teamRankings');
    if (!host) return;
    host.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--sub);">Loading…</div>`;
    let rankings;
    try { const r = await fetchTeamRankings(rankingsSortBy); rankings = r.rankings || []; }
    catch (err) { host.innerHTML = `<div class="error-banner" style="margin:0;"><span>⚠️ ${esc(err.message||'Failed')}</span><button class="retry-btn" onclick="renderTeamRankings()">Retry</button></div>`; return; }
    if (rankings.length===0) { host.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--sub);">No active teams to rank.</div>`; return; }
    host.innerHTML = `<div class="team-rankings">${rankings.map((t,i)=>`
        <div class="ranking-card">
            <div class="rank-number">${i+1}</div>
            <div class="team-info"><h3>${esc(t.name)}</h3><p>Coach: ${esc(t.coach)}</p></div>
            <div class="team-stats">
                <div class="stat"><span class="stat-label">Budget</span><span class="stat-value">${fmtMoney(t.budget)}</span></div>
                <div class="stat"><span class="stat-label">Collected</span><span class="stat-value">${fmtMoney(t.collected)}</span></div>
                <div class="stat"><span class="stat-label">% Complete</span><span class="stat-value">${t.percentCollected}%</span></div>
                <div class="stat"><span class="stat-label">Balance Due</span><span class="stat-value">${fmtMoney(t.balance)}</span></div>
            </div>
            ${t.completed?'<span class="completed-badge">✓ Completed</span>':''}
        </div>`).join('')}</div>`;
}

// ── PAGINATION ────────────────────────────────────────────────────
function renderPagination(containerId, state, totalPages, totalItems, onPageChange, onPerPageChange) {
    const el = document.getElementById(containerId);
    if (!el) return;
    el._onPageChange = onPageChange; el._onPerPageChange = onPerPageChange;
    el.innerHTML = `
        <div class="pagination-info">Page ${state.page} of ${totalPages}${totalItems?` &middot; ${totalItems} total`:''}</div>
        <div class="pagination-controls">
            <div class="per-page-select"><select onchange="(function(c,v){c._onPerPageChange(parseInt(v,10));})(this.closest('.pagination'),this.value)">
                <option value="20" ${state.perPage===20?'selected':''}>20</option>
                <option value="50" ${state.perPage===50?'selected':''}>50</option>
                <option value="100" ${state.perPage===100?'selected':''}>100</option>
            </select></div>
            <button class="page-btn" ${state.page<=1?'disabled':''} onclick="(function(c){c._onPageChange(${state.page-1});})(this.closest('.pagination'))">Prev</button>
            <button class="page-btn current">${state.page}</button>
            <button class="page-btn" ${state.page>=totalPages?'disabled':''} onclick="(function(c){c._onPageChange(${state.page+1});})(this.closest('.pagination'))">Next</button>
        </div>`;
}

// ── PLAYER FILTER DEBOUNCE ────────────────────────────────────────
let _filterTimer = null;
function onPlayerFilterChange(coachId) {
    const pState = paginationState.team[coachId] || (paginationState.team[coachId] = { page:1, perPage:20 });
    pState.page = 1;
    clearTimeout(_filterTimer);
    _filterTimer = setTimeout(() => renderTeamPlayerTable(coachId), 250);
}
</script>
</body>
</html>
