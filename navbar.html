<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar Widget – Ambassadors Baseball</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── NAVBAR ── */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: #ffffff;
      box-shadow: 0 2px 10px rgba(0,0,0,.10);
    }
    .navbar-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 2.5rem;
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2rem;
    }

    /* ── LOGO ── */
    .navbar-logo {
      flex-shrink: 0;
      text-decoration: none;
      display: block;
    }
    .navbar-logo img {
      height: 90px;
      width: auto;
      display: block;
      object-fit: contain;
    }
    .navbar-logo-fallback {
      display: inline-flex;
      flex-direction: column;
      line-height: 1.15;
    }
    .navbar-logo-fallback .logo-top {
      font-family: 'Oswald', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: #c8102e;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .navbar-logo-fallback .logo-bottom {
      font-family: 'Oswald', sans-serif;
      font-size: .85rem;
      font-weight: 600;
      color: #1a3fc4;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .navbar-logo-fallback .logo-tag {
      font-family: Georgia, serif;
      font-size: .62rem;
      font-style: italic;
      color: #c8102e;
    }

    /* ── NAV LINKS ── */
    .navbar-links {
      display: flex;
      align-items: center;
      gap: .05rem;
      list-style: none;
      margin: 0;
      padding: 0;
      flex: 1;
      justify-content: center;
    }
    .navbar-links a {
      font-family: 'Open Sans', sans-serif;
      font-size: .83rem;
      font-weight: 600;
      color: #1a1a1a;
      text-decoration: none;
      padding: .4rem .6rem;
      border-radius: 4px;
      transition: color .15s, background .15s;
      white-space: nowrap;
    }
    .navbar-links a:hover {
      color: #1a3fc4;
      background: #f0f4ff;
    }

    /* ── COACH LOGIN BUTTON ── */
    .navbar-login {
      flex-shrink: 0;
      display: inline-block;
      background: #1a3fc4;
      color: #fff !important;
      font-family: 'Open Sans', sans-serif;
      font-size: .88rem;
      font-weight: 700;
      text-decoration: none;
      padding: .65rem 1.6rem;
      border-radius: 50px;
      white-space: nowrap;
      transition: background .2s;
    }
    .navbar-login:hover {
      background: #0d2a99;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 960px) {
      .navbar-links { display: none; }
      .navbar-inner { padding: 0 1.2rem; gap: 1rem; }
    }
    @media (max-width: 480px) {
      .navbar-inner { height: 80px; }
      .navbar-logo img { height: 62px; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">

    <a class="navbar-logo" href="https://ambassadorsbaseball.com">
      <img
        src="src/logo.webp"
        alt="Ambassadors Baseball"
        onerror="this.style.display='none'; this.parentElement.innerHTML='<span class=\'navbar-logo-fallback\'><span class=\'logo-top\'>Ambassadors</span><span class=\'logo-bottom\'>Baseball</span><span class=\'logo-tag\'>Let Your Light Shine</span></span>';"
      >
    </a>

    <ul class="navbar-links">
      <li><a href="https://ambassadorsbaseball.com">Home</a></li>
      <li><a href="https://ambassadorsbaseball.com/about">About</a></li>
      <li><a href="https://ambassadorsbaseball.com/mission">Mission</a></li>
      <li><a href="https://ambassadorsbaseball.com/teams-tryouts">Teams &amp; Tryouts</a></li>
      <li><a href="https://ambassadorsbaseball.com/commitments">Commitments</a></li>
      <li><a href="https://ambassadorsbaseball.com/opportunities">Opportunities</a></li>
      <li><a href="https://ambassadorsbaseball.com/faq">FAQ</a></li>
      <li><a href="https://ambassadorsbaseball.com/contact">Contact</a></li>
    </ul>

    <a href="https://ambassadorsbaseball.com/coach-login" class="navbar-login">Coach Login</a>

  </div>
</nav>

</body>
</html>
