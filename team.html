<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Details – Ambassadors Baseball</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy:  #0a1628;
  --red:   #c8102e;
  --red2:  #a50d25;
  --gold:  #f5c518;
  --white: #ffffff;
  --light: #f4f6f9;
  --mid:   #dce3ec;
  --text:  #1a1a2e;
  --sub:   #5a6a7a;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Open Sans', sans-serif; background: var(--light); color: var(--text); min-height: 100vh; }

/* PAGE HEADER */
.page-header { background: linear-gradient(135deg, #1a3fc4 0%, #1535a8 100%); padding: 2rem 2rem 1.6rem; position: relative; overflow: hidden; }
.page-header::before { content: ''; position: absolute; inset: 0; background: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E"); }
.page-header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 1rem; position: relative; }
.page-header h1 { font-family: 'Oswald', sans-serif; font-size: clamp(1.4rem, 3vw, 2rem); font-weight: 700; color: var(--white); letter-spacing: .04em; text-transform: uppercase; }
.back-btn { display: inline-flex; align-items: center; gap: .5rem; background: rgba(255,255,255,.15); color: var(--white); text-decoration: none; font-family: 'Oswald', sans-serif; font-size: .75rem; font-weight: 500; letter-spacing: .1em; text-transform: uppercase; padding: 9px 16px; border-radius: 4px; transition: background .2s; white-space: nowrap; flex-shrink: 0; }
.back-btn:hover { background: rgba(255,255,255,.26); }

.main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 0; }

/* SHARED CARD */
.card { background: var(--white); border-radius: 6px; box-shadow: 0 2px 12px rgba(0,0,0,.07); overflow: hidden; }
.card-header { background: var(--red); padding: 11px 20px; font-family: 'Oswald', sans-serif; font-size: .9rem; font-weight: 600; color: var(--white); letter-spacing: .12em; text-transform: uppercase; text-align: center; }
.card-body { padding: 1.2rem 1.4rem; }

/* TEAM DETAILS */
.team-details-card { margin-bottom: 1.4rem; }
.detail-table { width: 100%; border-collapse: collapse; }
.detail-table tr { border-bottom: 1px solid var(--mid); }
.detail-table tr:last-child { border-bottom: none; }
.detail-table td { padding: 10px 0; font-size: .85rem; vertical-align: top; }
.detail-table td:first-child { color: var(--sub); font-size: .7rem; letter-spacing: .1em; text-transform: uppercase; width: 110px; padding-right: 12px; padding-top: 12px; }
.detail-table td:last-child { font-weight: 600; color: var(--navy); }

/* COACHES SECTION */
.coaches-section { background: var(--white); border-radius: 6px; box-shadow: 0 2px 12px rgba(0,0,0,.07); overflow: hidden; margin-bottom: 1.4rem; }
.coaches-section-header { background: var(--red); padding: 11px 20px; font-family: 'Oswald', sans-serif; font-size: .9rem; font-weight: 600; color: var(--white); letter-spacing: .12em; text-transform: uppercase; text-align: center; }
.coaches-inner { display: grid; grid-template-columns: 360px 1fr; }
.coaches-list-card { display: flex; flex-direction: column; border-right: 1px solid var(--mid); }

.coach-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-bottom: 1px solid var(--mid); cursor: pointer; transition: background .12s; position: relative; }
.coach-item:last-child { border-bottom: none; }
.coach-item:hover { background: var(--light); }
.coach-item.active { background: #fef3f5; }
.coach-item.active::after { content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 3px; background: var(--red); }

.coach-avatar { width: 76px; height: 76px; border-radius: 50%; background: var(--light); border: 1px solid var(--mid); display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
.coach-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: center 15%; border-radius: 50%; }
.coach-avatar svg { width: 20px; height: 20px; color: #aab; }
.coach-info { flex: 1; min-width: 0; }
.coach-name { font-family: 'Oswald', sans-serif; font-size: .85rem; font-weight: 600; color: var(--navy); text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.coach-role { font-size: .68rem; color: var(--sub); margin-top: 2px; }

.view-details-btn { display: inline-flex; align-items: center; gap: 4px; background: var(--red); color: var(--white); border: none; border-radius: 4px; padding: 5px 9px; font-family: 'Oswald', sans-serif; font-size: .63rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: background .15s; }
.view-details-btn:hover { background: var(--red2); }
.view-details-btn svg { width: 11px; height: 11px; }
.no-info { color: var(--sub); font-size: .86rem; padding: .8rem 14px; }

.coach-detail-panel { overflow: hidden; }

.cdp-hero { background: linear-gradient(135deg, var(--navy) 0%, #162845 100%); padding: 1.5rem; display: flex; align-items: center; gap: 1.1rem; position: relative; overflow: hidden; }
.cdp-hero::after { content: ''; position: absolute; bottom: -30px; right: -30px; width: 120px; height: 120px; border-radius: 50%; background: rgba(200,16,46,.18); pointer-events: none; }
.cdp-photo { width: 170px; height: 170px; border-radius: 8px; border: 3px solid rgba(255,255,255,.22); background: #1e3457; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; }
.cdp-photo img { width: 100%; height: 100%; object-fit: cover; object-position: center 15%; border-radius: 0; }
.cdp-photo svg { width: 34px; height: 34px; color: rgba(255,255,255,.4); }
.cdp-hero-text { flex: 1; min-width: 0; position: relative; z-index: 1; }
.cdp-name { font-family: 'Oswald', sans-serif; font-size: 1.15rem; font-weight: 700; color: var(--white); text-transform: uppercase; letter-spacing: .04em; line-height: 1.1; }
.cdp-badge { display: inline-block; background: var(--red); color: var(--white); font-family: 'Oswald', sans-serif; font-size: .6rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; padding: 3px 9px; border-radius: 3px; margin-top: 6px; }
.cdp-body { padding: 1.2rem 1.4rem; background: linear-gradient(135deg, var(--navy) 0%, #162845 100%); }
.cdp-section-label { font-size: .64rem; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,.5); margin-bottom: .55rem; margin-top: 1.1rem; }
.cdp-section-label:first-child { margin-top: 0; }
.cdp-bio { background: rgba(255,255,255,.07); border-radius: 5px; padding: .85rem 1rem; font-size: .82rem; line-height: 1.7; color: rgba(255,255,255,.85); border-left: 3px solid var(--red); }
.cdp-contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
.cdp-contact-row { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,.07); border-radius: 6px; padding: .75rem .9rem; }
.cdp-contact-icon { width: 34px; height: 34px; border-radius: 7px; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.15); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.cdp-contact-icon svg { width: 16px; height: 16px; color: rgba(255,255,255,.7); }
.cdp-contact-label { font-size: .63rem; color: rgba(255,255,255,.45); letter-spacing: .08em; text-transform: uppercase; }
.cdp-contact-value { font-size: .83rem; font-weight: 600; color: var(--white); margin-top: 2px; }
.cdp-contact-value a { color: var(--white); text-decoration: none; }
.cdp-contact-value a:hover { color: var(--gold); text-decoration: underline; }
.cdp-empty { display: flex; align-items: center; justify-content: center; height: 200px; color: rgba(255,255,255,.4); font-size: .86rem; text-align: center; padding: 2rem; background: linear-gradient(135deg, var(--navy) 0%, #162845 100%); }

/* SCHEDULE */
.schedule-card { background: var(--white); border-radius: 6px; box-shadow: 0 2px 12px rgba(0,0,0,.07); overflow: hidden; margin-bottom: 1.4rem; }
.schedule-header { background: var(--red); padding: 11px 20px; font-family: 'Oswald', sans-serif; font-size: .9rem; font-weight: 600; color: var(--white); letter-spacing: .12em; text-transform: uppercase; text-align: center; }
.schedule-controls { display: flex; align-items: center; justify-content: space-between; padding: .9rem 1.2rem; border-bottom: 1px solid var(--mid); gap: 1rem; flex-wrap: wrap; }
.schedule-show { display: flex; align-items: center; gap: .5rem; font-size: .82rem; color: var(--sub); }
.schedule-show select { border: 1px solid var(--mid); border-radius: 4px; padding: 3px 6px; font-size: .82rem; color: var(--text); background: var(--white); cursor: pointer; }
.schedule-search { display: flex; align-items: center; gap: .5rem; font-size: .82rem; color: var(--sub); }
.schedule-search input { border: 1px solid var(--mid); border-radius: 4px; padding: 5px 10px; font-size: .82rem; color: var(--text); background: var(--white); outline: none; width: 180px; transition: border-color .15s; }
.schedule-search input:focus { border-color: var(--red); }
.schedule-table-wrap { overflow-x: auto; }
.schedule-table { width: 100%; border-collapse: collapse; font-size: .84rem; }
.schedule-table thead tr { background: var(--navy); }
.schedule-table thead th { padding: 11px 14px; text-align: left; font-family: 'Oswald', sans-serif; font-size: .75rem; font-weight: 600; color: var(--white); letter-spacing: .1em; text-transform: uppercase; white-space: nowrap; user-select: none; cursor: pointer; }
.schedule-table thead th:hover { background: #1e3457; }
.schedule-table thead th.sort-asc,
.schedule-table thead th.sort-desc { background: #1e3457; }
.sort-icon { display: inline-flex; flex-direction: column; gap: 1px; margin-left: 6px; vertical-align: middle; opacity: .4; }
.sort-icon .up   { display: block; width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; border-bottom: 5px solid currentColor; }
.sort-icon .down { display: block; width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 5px solid currentColor; }
th.sort-asc  .sort-icon,
th.sort-desc .sort-icon { opacity: 1; }
th.sort-asc  .sort-icon .down { opacity: .3; }
th.sort-desc .sort-icon .up   { opacity: .3; }
.schedule-table tbody tr { border-bottom: 1px solid var(--mid); transition: background .12s; }
.schedule-table tbody tr:last-child { border-bottom: none; }
.schedule-table tbody tr:hover { background: var(--light); }
.schedule-table td { padding: 11px 14px; vertical-align: middle; color: var(--text); font-size: .83rem; }
.schedule-table td:first-child { font-weight: 600; color: var(--navy); white-space: nowrap; }
.schedule-footer { display: flex; align-items: center; justify-content: space-between; padding: .75rem 1.2rem; border-top: 1px solid var(--mid); font-size: .78rem; color: var(--sub); flex-wrap: wrap; gap: .5rem; }
.schedule-pagination { display: flex; align-items: center; gap: .4rem; }
.page-btn { display: inline-flex; align-items: center; gap: 4px; background: none; border: 1px solid var(--mid); border-radius: 4px; padding: 4px 10px; font-family: 'Oswald', sans-serif; font-size: .7rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--navy); cursor: pointer; transition: all .15s; }
.page-btn:hover:not(:disabled) { background: var(--red); border-color: var(--red); color: var(--white); }
.page-btn:disabled { opacity: .4; cursor: not-allowed; }
.page-btn svg { width: 12px; height: 12px; }
.no-schedule-rows { text-align: center; padding: 2.5rem; color: var(--sub); font-size: .88rem; }

/* ROSTER */
.roster-card { background: var(--white); border-radius: 6px; box-shadow: 0 2px 12px rgba(0,0,0,.07); overflow: hidden; margin-bottom: 1.4rem; }
.roster-header { background: var(--red); padding: 11px 20px; font-family: 'Oswald', sans-serif; font-size: .9rem; font-weight: 600; color: var(--white); letter-spacing: .12em; text-transform: uppercase; text-align: center; }
.roster-table-wrap { overflow-x: auto; }
.roster-table { width: 100%; border-collapse: collapse; font-size: .84rem; }
.roster-table thead tr { border-bottom: 2px solid var(--mid); background: #f9fafb; }
.roster-table thead th { padding: 11px 14px; text-align: left; font-size: .7rem; font-weight: 600; color: var(--sub); letter-spacing: .1em; text-transform: uppercase; white-space: nowrap; }
.roster-table tbody tr { border-bottom: 1px solid var(--mid); transition: background .12s; }
.roster-table tbody tr:last-child { border-bottom: none; }
.roster-table tbody tr:hover { background: var(--light); }
.roster-table td { padding: 11px 14px; vertical-align: middle; }
.player-cell { display: flex; align-items: center; gap: 10px; }
.player-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--light); border: 1px solid var(--mid); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.player-avatar svg { width: 18px; height: 18px; color: #bbc; }
.player-name { font-weight: 600; color: var(--navy); }
.empty-roster { text-align: center; padding: 2.5rem; color: var(--sub); font-size: .88rem; }

/* LOADING */
.loading-state { text-align: center; padding: 3rem 2rem; color: var(--sub); }
.spinner { width: 32px; height: 32px; border: 3px solid var(--mid); border-top-color: var(--red); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 1rem; }
@keyframes spin { to { transform: rotate(360deg); } }

/* FORM */
.form-widget-container { max-width: 1100px; margin: 0 auto; background: var(--white); border-radius: 6px; box-shadow: 0 2px 12px rgba(0,0,0,.07); overflow: hidden; min-height: 904px; }
.tryout-banner { background: var(--red); padding: 2.2rem 2rem; text-align: center; border-radius: 6px 6px 0 0; box-shadow: 0 2px 12px rgba(0,0,0,.1); }
.tryout-banner h2 { font-family: 'Oswald', sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--white); letter-spacing: .08em; text-transform: uppercase; margin-bottom: .5rem; }
.tryout-banner p { color: rgba(255,255,255,.85); font-size: .92rem; line-height: 1.7; }

/* TRYOUTS SECTION */
.tryouts-section-wrap { margin-bottom: 1.4rem; }
.tryouts-section-wrap .card-header { border-radius: 6px 6px 0 0; }
.tryouts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.2rem; padding: 1.4rem; background: var(--white); border-radius: 0 0 6px 6px; box-shadow: 0 2px 12px rgba(0,0,0,.07); }
.tryout-card { background: var(--white); border: 1px solid var(--mid); border-radius: 10px; padding: 1.2rem 1.3rem 1.1rem; display: flex; flex-direction: column; gap: .55rem; transition: box-shadow .15s, transform .15s; position: relative; }
.tryout-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,.1); transform: translateY(-2px); }
.tryout-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: .5rem; }
.tryout-fee-badge { display: inline-flex; align-items: center; background: var(--navy); color: var(--white); font-family: 'Oswald', sans-serif; font-size: .65rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; padding: 4px 11px; border-radius: 20px; white-space: nowrap; }
.tryout-cal-icon { color: var(--mid); flex-shrink: 0; margin-top: 2px; }
.tryout-cal-icon svg { width: 18px; height: 18px; }
.tryout-date { font-family: 'Oswald', sans-serif; font-size: 1.25rem; font-weight: 700; color: var(--navy); margin-top: .3rem; line-height: 1.1; }
.tryout-time { font-size: .8rem; color: var(--sub); margin-top: .1rem; }
.tryout-location { display: flex; align-items: center; gap: 6px; font-size: .82rem; color: var(--sub); margin-top: .2rem; }
.tryout-location svg { width: 15px; height: 15px; color: var(--sub); flex-shrink: 0; }
.tryout-register-btn { display: block; width: 100%; margin-top: .6rem; padding: 10px 0; background: var(--white); color: var(--navy); border: 2px solid var(--navy); border-radius: 8px; font-family: 'Oswald', sans-serif; font-size: .82rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; text-align: center; text-decoration: none; transition: background .15s, color .15s; }
.tryout-register-btn:hover { background: var(--navy); color: var(--white); }
.no-tryouts { text-align: center; padding: 2.5rem; color: var(--sub); font-size: .88rem; grid-column: 1 / -1; }

/* REGISTRATION */
.registration-card { background: var(--white); border-radius: 6px; box-shadow: 0 2px 12px rgba(0,0,0,.07); overflow: hidden; margin-bottom: 1.4rem; }
.registration-header { background: var(--red); padding: 11px 20px; font-family: 'Oswald', sans-serif; font-size: .9rem; font-weight: 600; color: var(--white); letter-spacing: .12em; text-transform: uppercase; text-align: center; }
.registration-body { padding: 1.6rem 1.8rem 1.8rem; }
.reg-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem 1.4rem; }
.reg-field { display: flex; flex-direction: column; gap: .45rem; }
.reg-label { font-size: .68rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--sub); }
.reg-input, .reg-select { border: 1.5px solid var(--mid); border-radius: 8px; padding: 11px 14px; font-size: .88rem; font-family: 'Open Sans', sans-serif; color: var(--text); background: var(--white); outline: none; transition: border-color .15s, box-shadow .15s; width: 100%; }
.reg-input::placeholder { color: #b0bec5; }
.reg-input:focus, .reg-select:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(200,16,46,.08); }
.reg-submit-btn { margin-top: 1.4rem; display: flex; align-items: center; justify-content: center; gap: .5rem; width: 100%; background: var(--navy); color: var(--white); border: none; border-radius: 8px; padding: 14px 0; font-family: 'Oswald', sans-serif; font-size: 1rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; transition: background .15s; }
.reg-submit-btn:hover { background: #162845; }
.reg-submit-btn svg { width: 18px; height: 18px; }
.reg-success { display: none; text-align: center; padding: 2rem; color: #2e7d32; font-size: .95rem; font-weight: 600; }

/* REGISTRATION SUCCESS MODAL */
.reg-modal-overlay { position: fixed; inset: 0; background: rgba(10,22,40,.6); backdrop-filter: blur(4px); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 1rem; opacity: 0; pointer-events: none; transition: opacity .25s; }
.reg-modal-overlay.open { opacity: 1; pointer-events: all; }
.reg-modal { background: var(--white); border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,.3); width: 100%; max-width: 540px; max-height: 90vh; display: flex; flex-direction: column; transform: translateY(24px) scale(.97); transition: transform .28s cubic-bezier(.4,0,.2,1); overflow: hidden; }
.reg-modal-overlay.open .reg-modal { transform: translateY(0) scale(1); }
.reg-modal-header { background: var(--navy); padding: 1.4rem 1.6rem; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.reg-modal-header h2 { font-family: 'Oswald', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--white); text-transform: uppercase; letter-spacing: .08em; margin: 0; }
.reg-modal-close { background: none; border: none; color: var(--white); font-size: 1.5rem; cursor: pointer; padding: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; transition: opacity .2s; }
.reg-modal-close:hover { opacity: .7; }
.reg-modal-body { overflow-y: auto; padding: 1.6rem; flex: 1; }
.reg-modal-footer { padding: 1.2rem 1.6rem; border-top: 1px solid var(--mid); display: flex; gap: .8rem; flex-shrink: 0; }
.reg-modal-btn { flex: 1; padding: 11px 16px; border: none; border-radius: 6px; font-family: 'Oswald', sans-serif; font-size: .9rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; transition: background .15s; }
.reg-modal-btn-primary { background: var(--navy); color: var(--white); }
.reg-modal-btn-primary:hover { background: #162845; }
.reg-modal-btn-secondary { background: var(--light); color: var(--navy); }
.reg-modal-btn-secondary:hover { background: var(--mid); }

/* RESPONSIVE */
@media (max-width: 820px) {
  .coaches-inner { grid-template-columns: 1fr; }
  .coaches-list-card { border-right: none; border-bottom: 1px solid var(--mid); }
  .cdp-contact-grid { grid-template-columns: 1fr; }
  .reg-form-grid { grid-template-columns: 1fr; }
}
@media (max-width: 680px) {
  .page-header-inner { flex-direction: column; align-items: flex-start; }
  .main { padding: 1.5rem 1rem 3rem; }
  .tryout-banner { border-radius: 0; margin-top: 2rem; padding: 1.8rem 1.2rem; }
}
</style>
</head>
<body>

<div class="page-header">
  <div class="page-header-inner">
    <h1 id="page-title">Loading…</h1>
    <a href="index.html" class="back-btn">← Back To Team Directory</a>
  </div>
</div>

<!-- TEAM DETAILS · COACHES · ROSTER — rendered by JS -->
<div class="main" id="main-content">
  <div class="loading-state">
    <div class="spinner"></div>
    Loading team details…
  </div>
</div>

<div class="main" style="padding-top:0; padding-bottom:0;" id="extra-sections">

  <!-- SCHEDULE -->
  <div id="schedule-section" style="margin-bottom:1.4rem;" hidden>
    <div class="schedule-card">
      <div class="schedule-header">Team Schedule</div>
      <div class="schedule-controls">
        <div class="schedule-show">
          Show
          <select id="sch-per-page">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="25">25</option>
            <option value="all">All</option>
          </select>
          entries
        </div>
        <div class="schedule-search">
          Search: <input type="text" id="sch-search" placeholder="Filter events…">
        </div>
      </div>
      <div class="schedule-table-wrap">
        <table class="schedule-table">
          <thead>
            <tr>
              <th data-col="0">Date <span class="sort-icon"><span class="up"></span><span class="down"></span></span></th>
              <th data-col="1">Event Name <span class="sort-icon"><span class="up"></span><span class="down"></span></span></th>
              <th data-col="2">City <span class="sort-icon"><span class="up"></span><span class="down"></span></span></th>
              <th data-col="3">State <span class="sort-icon"><span class="up"></span><span class="down"></span></span></th>
            </tr>
          </thead>
          <tbody id="sch-body"></tbody>
        </table>
      </div>
      <div class="schedule-footer">
        <span id="sch-info">Showing 0 entries</span>
        <div class="schedule-pagination">
          <button class="page-btn" id="sch-prev" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
            Previous
          </button>
          <button class="page-btn" id="sch-next" disabled>
            Next
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- TRYOUTS -->
  <div id="tryouts-section" style="margin-bottom:1.4rem;">
    <div class="tryouts-section-wrap">
      <div class="card-header" style="background:var(--red);border-radius:6px 6px 0 0;font-family:'Oswald',sans-serif;font-size:.9rem;font-weight:600;color:#fff;letter-spacing:.12em;text-transform:uppercase;text-align:center;padding:11px 20px;">Upcoming Tryouts</div>
      <div class="tryouts-grid" id="tryouts-grid">
        <div class="no-tryouts">Loading tryouts…</div>
      </div>
    </div>
  </div>

  <!-- ACCEPT INVITATION / REGISTRATION -->
  <div style="margin-bottom:1.4rem;">
    <div class="registration-card">
      <div class="registration-header">Accept Invitation / Registration</div>
      <div class="registration-body">
        <div class="reg-form-grid" id="reg-form">
          <div class="reg-field">
            <label class="reg-label">Player Name</label>
            <input class="reg-input" type="text" placeholder="Full Name" id="reg-name">
          </div>
          <div class="reg-field">
            <label class="reg-label">Preferred Jersey #</label>
            <input class="reg-input" type="text" placeholder="e.g. 12" id="reg-jersey">
          </div>
          <div class="reg-field">
            <label class="reg-label">Grad Year</label>
            <input class="reg-input" type="text" placeholder="e.g. 2026" id="reg-gradyear">
          </div>
          <div class="reg-field">
            <label class="reg-label">Position 1</label>
            <select class="reg-select" id="reg-position">
              <option value="" disabled selected>Select position</option>
              <option value="OF">OF</option>
              <option value="INF">INF</option>
              <option value="C">C</option>
              <option value="RHP">RHP</option>
              <option value="LHP">LHP</option>
            </select>
          </div>
          <div class="reg-field" style="grid-column:1">
            <label class="reg-label">Height / Weight</label>
            <input class="reg-input" type="text" placeholder="e.g. 6'0 / 185lb" id="reg-hw">
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:1.4rem; grid-column:2">
            <div class="reg-field">
              <label class="reg-label">City</label>
              <input class="reg-input" type="text" placeholder="City" id="reg-city">
            </div>
            <div class="reg-field">
              <label class="reg-label">State</label>
              <input class="reg-input" type="text" placeholder="e.g. TN" id="reg-state" maxlength="2">
            </div>
          </div>
          <div class="reg-field">
            <label class="reg-label">Email</label>
            <input class="reg-input" type="email" placeholder="email@example.com" id="reg-email">
          </div>
          <div class="reg-field">
            <label class="reg-label">Cell Phone</label>
            <input class="reg-input" type="tel" placeholder="(000) 000-0000" id="reg-cell">
          </div>
        </div>
        <div class="reg-success" id="reg-success">
          Registration submitted successfully! We'll be in touch soon.
        </div>
        <button class="reg-submit-btn" id="reg-submit-btn">
          Submit Registration
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
    </div>
  </div>

</div>

<!-- REGISTRATION SUCCESS MODAL -->
<div class="reg-modal-overlay" id="reg-modal-overlay">
  <div class="reg-modal">
    <div class="reg-modal-header">
      <h2>Registration Submitted</h2>
      <button class="reg-modal-close" onclick="closeRegistrationModal()">&times;</button>
    </div>
    <div class="reg-modal-body" id="reg-modal-body">
      <!-- Content will be inserted here -->
    </div>
    <div class="reg-modal-footer">
      <button class="reg-modal-btn reg-modal-btn-primary" onclick="closeRegistrationModal()">Close</button>
    </div>
  </div>
</div>

<script>
'use strict';

const API_BASE = 'https://backend-baseball-inky.vercel.app';

const ABBR_TO_NAME = {
  "AL":"Alabama","AK":"Alaska","AZ":"Arizona","AR":"Arkansas","CA":"California",
  "CO":"Colorado","CT":"Connecticut","DE":"Delaware","FL":"Florida","GA":"Georgia",
  "HI":"Hawaii","ID":"Idaho","IL":"Illinois","IN":"Indiana","IA":"Iowa",
  "KS":"Kansas","KY":"Kentucky","LA":"Louisiana","ME":"Maine","MD":"Maryland",
  "MA":"Massachusetts","MI":"Michigan","MN":"Minnesota","MS":"Mississippi",
  "MO":"Missouri","MT":"Montana","NE":"Nebraska","NV":"Nevada","NH":"New Hampshire",
  "NJ":"New Jersey","NM":"New Mexico","NY":"New York","NC":"North Carolina",
  "ND":"North Dakota","OH":"Ohio","OK":"Oklahoma","OR":"Oregon","PA":"Pennsylvania",
  "RI":"Rhode Island","SC":"South Carolina","SD":"South Dakota","TN":"Tennessee",
  "TX":"Texas","UT":"Utah","VT":"Vermont","VA":"Virginia","WA":"Washington",
  "WV":"West Virginia","WI":"Wisconsin","WY":"Wyoming"
};

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const params    = new URLSearchParams(window.location.search);
const teamId    = params.get('id');
const teamName  = params.get('name');
const teamState = params.get('state');

if (teamName) {
  document.getElementById('page-title').textContent = teamName;
  document.title = `${teamName} – Ambassadors Baseball`;
}

const avatarSVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>`;

let allCoaches = [];

/* ── RENDER COACH DETAIL ── */
function renderCoachDetail(coach, activeIndex) {
  document.querySelectorAll('.coach-item').forEach((el, i) => {
    el.classList.toggle('active', i === activeIndex);
  });

  const photoHtml = coach.image
    ? `<img src="${esc(coach.image)}" alt="${esc(coach.name)}">`
    : avatarSVG;

  const emailVal = coach.email || '';
  const cellVal  = coach.cell  || '';
  const cellHref = cellVal.replace(/\D/g, '');

  document.getElementById('coach-detail-panel').innerHTML = `
    <div class="cdp-hero">
      <div class="cdp-photo">${photoHtml}</div>
      <div class="cdp-hero-text">
        <div class="cdp-name">${esc(coach.name)}</div>
        <div class="cdp-badge">${esc(coach.role)}</div>
      </div>
    </div>
    <div class="cdp-body">
      ${coach.bio ? `<div class="cdp-section-label">Bio</div><div class="cdp-bio">${esc(coach.bio)}</div>` : ''}
      <div class="cdp-section-label">Contact Information</div>
      <div class="cdp-contact-grid">
        <div class="cdp-contact-row">
          <div class="cdp-contact-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
          </div>
          <div>
            <div class="cdp-contact-label">Email</div>
            <div class="cdp-contact-value">${emailVal ? `<a href="mailto:${esc(emailVal)}">${esc(emailVal)}</a>` : '—'}</div>
          </div>
        </div>
        <div class="cdp-contact-row">
          <div class="cdp-contact-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.68A2 2 0 012 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
          </div>
          <div>
            <div class="cdp-contact-label">Cell</div>
            <div class="cdp-contact-value">${cellVal ? `<a href="tel:+1${cellHref}">${esc(cellVal)}</a>` : '—'}</div>
          </div>
        </div>
      </div>
    </div>`;
}

/* ── REGISTRATION FORM ── */
document.getElementById('reg-submit-btn').addEventListener('click', async function () {
  const name     = document.getElementById('reg-name').value.trim();
  const jersey   = document.getElementById('reg-jersey').value.trim();
  const gradYear = document.getElementById('reg-gradyear').value.trim();
  const position = document.getElementById('reg-position').value;
  const hw       = document.getElementById('reg-hw').value.trim();
  const city     = document.getElementById('reg-city').value.trim();
  const state    = document.getElementById('reg-state').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const cell     = document.getElementById('reg-cell').value.trim();

  if (!name || !gradYear || !position) {
    alert('Please fill in at least Player Name, Grad Year, and Position.');
    return;
  }

  this.disabled = true;
  this.textContent = 'Submitting…';

  try {
    const res = await fetch(`${API_BASE}/api/teams/${teamId}/roster`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, jersey, gradYear, position, hw, city, state, email, cell })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || 'Failed to submit');

    // Hide form and button
    document.getElementById('reg-form').style.display = 'none';
    this.style.display = 'none';

    // Show success modal
    showRegistrationModal(name);
    loadRoster(teamId);
  } catch (err) {
    alert('Error: ' + err.message);
    this.disabled = false;
    this.innerHTML = 'Submit Registration <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>';
  }
});

function showRegistrationModal(playerName, content) {
  const overlay = document.getElementById('reg-modal-overlay');
  const body = document.getElementById('reg-modal-body');
  if (!overlay || !body) return;
  
  if (content) {
    body.innerHTML = content;
  } else {
    body.innerHTML = `
      <div style="text-align:center">
        <div style="font-family:'Oswald',sans-serif;font-size:1.1rem;font-weight:700;color:var(--navy);margin-bottom:.8rem">Registration Successful!</div>
        <div style="font-size:.95rem;color:var(--sub);line-height:1.6">
          Welcome to the team, <strong>${esc(playerName)}</strong>! Your registration has been submitted successfully. We'll be in touch soon with next steps.
        </div>
      </div>`;
  }
  
  overlay.classList.add('open');
}

function closeRegistrationModal() {
  const overlay = document.getElementById('reg-modal-overlay');
  if (overlay) {
    overlay.classList.remove('open');
  }
}

/* ── LOAD ROSTER ── */
async function loadRoster(id) {
  try {
    const res  = await fetch(`${API_BASE}/api/teams/${id}/roster`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.message);
    const players = data.players || [];
    const tbody = document.getElementById('roster-body');
    if (!tbody) return;
    if (!players.length) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty-roster">No players have registered yet.</div></td></tr>`;
      return;
    }
    tbody.innerHTML = players.map(p => `
      <tr>
        <td>
          <div class="player-cell">
            <div class="player-avatar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            </div>
            <span class="player-name">${esc(p.name)}</span>
          </div>
        </td>
        <td>${esc(p.jersey || '—')}</td>
        <td>${esc(p.gradYear || '—')}</td>
        <td>${esc(p.position || '—')}</td>
        <td>${esc(p.hw || '—')}</td>
        <td>${esc(p.email || '—')}</td>
        <td>${esc(p.cell || '—')}</td>
      </tr>`).join('');
  } catch (err) {
    const tbody = document.getElementById('roster-body');
    if (tbody) tbody.innerHTML = `<tr><td colspan="7"><div class="empty-roster">No players have registered yet.</div></td></tr>`;
  }
}

/* ── MAIN LOAD ── */
let _teamFinancials = null;

async function loadTeam() {
  if (!teamId) { showError('Missing team information.'); return; }
  try {
    const [teamRes, finRes] = await Promise.all([
      fetch(`${API_BASE}/api/teams/${teamId}`),
      fetch(`${API_BASE}/api/teams/${teamId}/financials`),
    ]);
    const teamData = await teamRes.json();
    const finData  = await finRes.json();
    if (!teamRes.ok) throw new Error(teamData.message || 'Team not found');
    _teamFinancials = finData.financials || null;
    renderPage(teamData.team);
    loadRoster(teamId);
  } catch (err) {
    showError(err.message);
  }
}

/* ── RENDER PAGE ── */
function renderPage(team) {
  const fullState = ABBR_TO_NAME[team.state] || team.state || '';

  // Head coach from coach profile, assistants from nested objects
  allCoaches = [];
  allCoaches.push({
    name:  `${team.firstName} ${team.lastName}`,
    role:  'Head Coach',
    bio:   team.bio         || '',
    email: team.emailPublic || '',
    cell:  team.phonePublic || '',
    image: team.image       || '',
  });
  if (team.assistant1?.name) allCoaches.push({ name: team.assistant1.name, role: team.assistant1.role || 'Assistant Coach', bio: team.assistant1.bio || '', email: team.assistant1.email || '', cell: team.assistant1.cell || '', image: team.assistant1.image || '' });
  if (team.assistant2?.name) allCoaches.push({ name: team.assistant2.name, role: team.assistant2.role || 'Assistant Coach', bio: team.assistant2.bio || '', email: team.assistant2.email || '', cell: team.assistant2.cell || '', image: team.assistant2.image || '' });

  const locParts = [team.location, fullState].filter(Boolean);
  let detailRows = '';
  if (team.ageGroup)    detailRows += `<tr><td>Age Group</td><td>${esc(team.ageGroup)}</td></tr>`;
  if (fullState)        detailRows += `<tr><td>State</td><td>${esc(fullState)}</td></tr>`;
  if (team.teamDetails) detailRows += `<tr><td>Team Details</td><td>${esc(team.teamDetails)}</td></tr>`;
  if (!detailRows)      detailRows  = `<tr><td colspan="2" style="color:var(--sub);font-size:.84rem;padding:.75rem 0">No team details added yet.</td></tr>`;

  const coachListHtml = allCoaches.map((c, i) => `
    <div class="coach-item${i === 0 ? ' active' : ''}" data-index="${i}">
      <div class="coach-avatar">${c.image ? `<img src="${esc(c.image)}" alt="${esc(c.name)}" style="width:100%;height:100%;object-fit:cover;object-position:center 15%;border-radius:50%">` : avatarSVG}</div>
      <div class="coach-info">
        <div class="coach-name">${esc(c.name)}</div>
        <div class="coach-role">${esc(c.role)}</div>
      </div>
      <button class="view-details-btn" data-index="${i}" aria-label="View details for ${esc(c.name)}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        View
      </button>
    </div>`).join('');

  const rosterBody = `<tr><td colspan="7"><div class="empty-roster" id="roster-empty">Loading roster…</div></td></tr>`;

  document.getElementById('main-content').innerHTML = `
    <!-- 1. Team Details -->
    <div class="card team-details-card">
      <div class="card-header">Team Details</div>
      <div class="card-body">
        <table class="detail-table">${detailRows}</table>
      </div>
    </div>

    <!-- 2. Coaches -->
    <div class="coaches-section">
      <div class="coaches-section-header">Coaches</div>
      <div class="coaches-inner">
        <div class="coaches-list-card">${coachListHtml}</div>
        <div class="coach-detail-panel" id="coach-detail-panel">
          <div class="cdp-empty">Select a coach to view details</div>
        </div>
      </div>
    </div>

    <!-- 3. Roster -->
    <div class="roster-card">
      <div class="roster-header">Team Roster</div>
      <div class="roster-table-wrap">
        <table class="roster-table">
          <thead>
            <tr>
              <th>Player</th><th>Jersey</th><th>Grad Year</th>
              <th>Position</th><th>HT/WT</th><th>Email</th><th>Cell</th>
            </tr>
          </thead>
          <tbody id="roster-body">${rosterBody}</tbody>
        </table>
      </div>
    </div>
  `;

  // Coach click handlers
  document.querySelectorAll('.coach-item, .view-details-btn').forEach(el => {
    el.addEventListener('click', function (e) {
      e.stopPropagation();
      const idx = parseInt(this.dataset.index, 10);
      renderCoachDetail(allCoaches[idx], idx);
    });
  });

  // Default: show head coach
  if (allCoaches.length > 0) renderCoachDetail(allCoaches[0], 0);
}

/* ── ERROR STATE ── */
function showError(msg) {
  document.getElementById('main-content').innerHTML = `
    <div class="card">
      <div class="card-body" style="text-align:center;padding:3rem;color:var(--red)">
        <strong style="display:block;font-size:1.1rem;margin-bottom:.5rem">Unable to load team</strong>
        ${esc(msg)}<br><br>
        <a href="index.html" style="color:var(--red);font-family:'Oswald',sans-serif;letter-spacing:.05em">← Back to Team Directory</a>
      </div>
    </div>`;
}

loadTeam();
</script>

</body>
</html>
